<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تطبيق منعة</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات المشروع
        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // دالة تسجيل الدخول
        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: new Date()
                });
                alert("مرحباً " + user.displayName);
                location.reload();
            } catch (error) {
                console.error("خطأ:", error);
                alert("حدث خطأ، تأكد من اتصال الإنترنت");
            }
        };
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px;">
    <h1>تطبيق مدينة منعة</h1>
    <button onclick="loginWithGoogle()" style="padding:20px; font-size:18px; cursor:pointer;">
        الدخول بواسطة Google
    </button>
</body>
</html>
