<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v19.0 - نظام القيادة الحربي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --algeria-green: #006233; --algeria-red: #d21034; --cyber-green: #00ff41;
            --war-gold: #ffcc00; --bg-dark: #050505; --neon-blue: #00d2ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* تأثيرات الإضاءة الجانبية الحربية */
        .edge-glow { position: fixed; inset: 0; pointer-events: none; z-index: 9999; border: 2px solid var(--algeria-red); box-shadow: inset 0 0 30px var(--algeria-red); animation: threat-pulse 3s infinite; }
        @keyframes threat-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }

        .view { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .active-view { display: flex; }

        /* شعار القيادة */
        .circular-logo { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--cyber-green); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; box-shadow: 0 0 30px var(--cyber-green); margin-bottom: 20px; z-index: 10; }

        /* أزرار الأهداف المضيئة */
        .target-btn { 
            width: 90%; background: rgba(20, 20, 20, 0.8); border: 1px solid var(--cyber-green); 
            padding: 15px; border-radius: 10px; margin: 10px 0; color: var(--cyber-green); 
            font-weight: bold; text-align: center; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .target-btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--cyber-green); }
        .target-btn::before { content: "TARGET LOCKED"; position: absolute; top: 0; right: 5px; font-size: 8px; color: var(--algeria-red); }

        /* لوحة التحكم */
        .control-panel { width: 90%; background: rgba(0,0,0,0.9); border: 2px solid var(--algeria-green); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; border: 1px solid var(--cyber-green); color: var(--cyber-green); border-radius: 5px; text-align: center; }
        
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-green { background: var(--algeria-green); color: white; }
        .btn-gold { background: var(--war-gold); color: black; }

        /* القائمة المنبثقة */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; background: rgba(5,5,5,0.95); border-top: 3px solid var(--cyber-green); border-radius: 30px 30px 0 0; z-index: 10000; padding: 25px; transition: 0.5s ease; }
        .modal.active { bottom: 0; }
    </style>
</head>
<body>

<div class="edge-glow"></div>

<div id="view-login" class="view active-view">
    <div class="circular-logo"></div>
    <h2 style="color:white; text-shadow: 0 0 10px red;">منظومة الجلاد v19.0</h2>
    <button class="btn-action btn-gold" onclick="login()" style="width:200px; border-radius:50px;">تشغيل النظام 🔐</button>
</div>

<div id="view-menu" class="view" style="justify-content: flex-start; padding-top: 50px; overflow-y: auto;">
    <h3 style="color: var(--cyber-green); letter-spacing: 2px;">قائمة الأهداف المستهدفة</h3>
    
    <div id="add-target-panel" class="control-panel">
        <input type="text" id="target-input" placeholder="أدخل رابط الهدف (TikTok)...">
        <button class="btn-action btn-green" onclick="addTarget()">تعميم الهدف 🚀</button>
    </div>

    <div id="admin-only-panel" class="control-panel" style="border-color: var(--war-gold);">
        <input type="email" id="admin-email-input" placeholder="جيميل المشرف الجديد...">
        <button class="btn-action btn-gold" onclick="makeModerator()">إضافة مشرف للنظام 🎖️</button>
    </div>

    <div id="targets-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>
</div>

<div id="view-strike" class="view">
    <div style="font-size: 3rem; color: var(--cyber-green); font-family: monospace;" id="strike-clock">00:00</div>
    <div style="width: 250px; height: 250px; border: 1px solid var(--algeria-red); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <div style="width: 80%; height: 80%; border: 1px dashed var(--cyber-green); border-radius: 50%; animation: spin 4s linear infinite;"></div>
    </div>
    
    <div style="position: absolute; bottom: 50px; display: flex; gap: 20px;">
        <button onclick="openTikTok()" style="padding: 20px; border-radius: 15px; border: none; background: var(--algeria-red); color: white; font-weight: bold;">هجوم مباشر 🎯</button>
        <button onclick="openMail()" style="padding: 20px; border-radius: 15px; border: none; background: white; color: black; font-weight: bold;">قصف إيميل 📧</button>
    </div>
    <button onclick="goBack()" style="position: absolute; top: 20px; left: 20px; color: gray; background: none; border: none;">إلغاء ✕</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const OWNER_EMAIL = "marikanmarikan320@gmail.com";
    
    let currentTarget = "";

    // التحقق من حالة الدخول
    auth.onAuthStateChanged(user => {
        if(user) checkPermissions(user);
    });

    function login() {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            const provider = new firebase.auth.GoogleAuthProvider();
            return auth.signInWithPopup(provider);
        });
    }

    function checkPermissions(user) {
        // إذا كان القائد
        if(user.email === OWNER_EMAIL) {
            document.getElementById('add-target-panel').style.display = 'block';
            document.getElementById('admin-only-panel').style.display = 'block';
        } else {
            // التحقق إذا كان مشرفاً في قاعدة البيانات
            db.ref('moderators').orderByValue().equalTo(user.email).once('value', snapshot => {
                if(snapshot.exists()) {
                    document.getElementById('add-target-panel').style.display = 'block';
                }
            });
        }
        showView('view-menu');
        listenTargets();
    }

    function addTarget() {
        const url = document.getElementById('target-input').value;
        if(url) {
            db.ref('targets').push({ url: url, timestamp: Date.now() });
            document.getElementById('target-input').value = "";
        }
    }

    function makeModerator() {
        const email = document.getElementById('admin-email-input').value;
        if(email) {
            db.ref('moderators').push(email);
            alert("تمت إضافة المشرف بنجاح 🎖️");
            document.getElementById('admin-email-input').value = "";
        }
    }

    function listenTargets() {
        db.ref('targets').limitToLast(15).on('value', snap => {
            const list = document.getElementById('targets-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const btn = document.createElement('div');
                btn.className = 'target-btn';
                btn.innerText = "اختراق الهدف: " + child.val().url.substring(0, 30) + "...";
                btn.onclick = () => launchStrike(child.val().url);
                list.prepend(btn);
            });
        });
    }

    function launchStrike(url) {
        currentTarget = url;
        showView('view-strike');
        setInterval(() => {
            document.getElementById('strike-clock').innerText = new Date().toLocaleTimeString('en-GB', {hour12:false}).split(' ')[0];
        }, 1000);
    }

    function openTikTok() {
        window.location.href = currentTarget.replace("https://www.tiktok.com/", "snssdk1128://");
        setTimeout(() => window.location.href = currentTarget, 1000);
    }

    function openMail() {
        window.location.href = `mailto:feedback@tiktok.com?subject=Mass Report&body=Under Attack: ${currentTarget}`;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(id).classList.add('active-view');
    }

    function goBack() { showView('view-menu'); }
</script>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
