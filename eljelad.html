<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق منعة الرقمي</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* خلفية تكنولوجية ناعمة جداً ومندمجة */
        .app-bg {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0f0f13 0%, #000 100%);
            z-index: -1;
        }

        /* كتلة الهوية (الشعار + الاسم) */
        .identity-block {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 60px; animation: fadeIn 1s ease;
        }

        .logo-box {
            width: 120px; height: 120px; border-radius: 30px;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 20px; font-weight: 600; color: #fff; margin: 0;
            letter-spacing: 0.5px;
        }

        /* منطقة تسجيل الدخول (نمط فيسبوك/إنستقرام) */
        .login-box {
            width: 85%; max-width: 350px;
            display: flex; flex-direction: column; gap: 15px;
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; box-sizing: border-box;
        }

        .btn-login {
            width: 100%; padding: 15px; border-radius: 12px;
            background: #0095f6; color: white; border: none;
            font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.2s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-bg"></div>

    <div class="identity-block">
        <div class="logo-box"></div>
        <h1>تطبيق صفحة مدينة منعة</h1>
    </div>

    <div class="login-box">
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="password" placeholder="كلمة المرور">
        <button class="btn-login">تسجيل الدخول</button>
        <p style="text-align: center; color: #777; font-size: 13px; margin-top: 15px;">
            تطبيق تكنولوجي - النسخة الاحترافية
        </p>
    </div>

</body>
</html>
