<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v27.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --algeria-green: #006233; --algeria-red: #d21034; --cyber-green: #00ff41;
            --samsung-blue: #0355d0; --glass: rgba(10, 10, 10, 0.98);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; overflow: hidden; }

        /* تأثيرات العلم الجزائري المتوهج */
        .army-title { font-size: 1.4rem; text-align: center; font-weight: bold; padding: 20px; animation: flag-glow 3s infinite; }
        @keyframes flag-glow { 
            0%, 100% { color: #ffffff; text-shadow: 0 0 15px #ffffff; }
            33% { color: var(--algeria-red); text-shadow: 0 0 15px var(--algeria-red); }
            66% { color: var(--algeria-green); text-shadow: 0 0 15px var(--algeria-green); }
        }

        .view { display: none; width: 100%; height: 100%; position: absolute; inset: 0; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; background: #000; }
        .active-view { display: flex !important; }

        .logo-glow { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--cyber-green); box-shadow: 0 0 30px var(--cyber-green); margin: 20px auto; background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; }

        .btn-ui { width: 100%; max-width: 320px; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 1rem; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* لوحة القائد (الإحصائيات) */
        .stat-card { background: var(--glass); border: 1px solid var(--samsung-blue); border-radius: 20px; padding: 15px; margin: 10px; width: 120px; text-align: center; }
        .admin-box { width: 100%; max-width: 400px; background: #0a0a0a; border: 1px solid var(--samsung-blue); border-radius: 25px; padding: 20px; margin-bottom: 15px; }
        .data-row { background: #111; padding: 10px; border-radius: 12px; margin: 5px 0; font-size: 0.8rem; display: flex; justify-content: space-between; }

        /* الرادار والأهداف */
        .target-btn { width: 90%; background: var(--glass); border: 1px solid var(--cyber-green); border-radius: 20px; padding: 15px; margin-bottom: 12px; text-align: center; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }

        /* الترسانة الحربية */
        .hacker-view { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000 url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') no-repeat center/top; background-size: contain; z-index: 20000; transition: 0.6s ease-in-out; display: flex; flex-direction: column; align-items: center; padding-top: 250px; }
        .hacker-view.active { top: 0; }
        #digital-clock { font-size: 3rem; color: var(--cyber-green); font-weight: bold; text-shadow: 0 0 15px var(--cyber-green); margin-bottom: 20px; }
        .radar-spinner { width: 100px; height: 100px; border: 2px solid var(--algeria-red); border-radius: 50%; border-top: 2px solid transparent; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="view-login" class="view active-view" style="justify-content: center;">
    <h1 class="army-title">منظومة جيش التبليغ الجزائري<br>بقيادة الجلاد الجزائري</h1>
    <div class="logo-glow"></div>
    <button class="btn-ui btn-google" onclick="login()">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        سجل الدخول عبر Google 🛡️
    </button>
</div>

<div id="view-main" class="view">
    <div id="commander-ui" style="display: none; width: 100%; max-width: 420px;">
        <div style="display: flex; justify-content: center;">
            <div class="stat-card"><small>الجنود</small><div id="count-users" style="color:var(--cyber-green)">0</div></div>
            <div class="stat-card"><small>المشرفين</small><div id="count-mods" style="color:var(--samsung-blue)">0</div></div>
        </div>
        <div class="admin-box">
            <h4 style="margin:0 0 10px">🎖️ إدارة الأركان والجنود</h4>
            <div id="user-list" style="max-height: 80px; overflow-y:auto; margin-bottom:10px; font-size:0.7rem"></div>
            <input type="email" id="mod-email" placeholder="جيميل المشرف...">
            <button onclick="addMod()" style="width:100%; padding:10px; background:var(--samsung-blue); border:none; border-radius:15px; color:white;">تعيين مشرف 🎖️</button>
        </div>
        <div class="admin-box" style="border-color: var(--algeria-red);">
            <input type="text" id="target-url" placeholder="رابط تيك توك كهدف...">
            <button onclick="pushTarget()" style="width:100%; padding:12px; background:var(--algeria-red); border:none; border-radius:15px; color:white;">تعميم الهدف 🚀</button>
        </div>
    </div>
    <h3 style="color: gray; font-weight: 300;">رادار العمليات الجاري</h3>
    <div id="targets-radar" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="view-strike" class="hacker-view">
    <div id="digital-clock">00:00:00</div>
    <div class="radar-spinner"></div>
    
    <button class="btn-ui" style="background:var(--algeria-red); color:white;" onclick="strikeTikTok()">📍 اقتحام تيك توك</button>
    <button class="btn-ui" style="background:white; color:black;" onclick="strikeGmail()">📧 قصف إيميل (English)</button>
    <button class="btn-ui" style="background:var(--samsung-blue); color:white;" onclick="window.location.href='https://www.tiktok.com/legal/report/feedback'">📜 استمارة البلاغ</button>
    <button class="btn-ui" style="background:none; border:1px solid gray; color:gray;" onclick="document.getElementById('view-strike').classList.remove('active')">تراجع ✕</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com";
    let activeLink = "";

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).set({ email: user.email, status: 'online', ts: Date.now() });
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').classList.add('active-view');
            if(user.email === MASTER) {
                document.getElementById('commander-ui').style.display = 'block';
                loadCommanderData();
            }
            loadRadar();
            updateClock();
        }
    });

    function login() { auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => { return auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }); }

    function loadCommanderData() {
        db.ref('users').on('value', s => {
            document.getElementById('count-users').innerText = s.numChildren();
            let h = ""; s.forEach(u => h += `<div class="data-row"><span>${u.val().email}</span><span style="color:var(--cyber-green)">متصل</span></div>`);
            document.getElementById('user-list').innerHTML = h;
        });
        db.ref('mods').on('value', s => document.getElementById('count-mods').innerText = s.numChildren());
    }

    function addMod() { const e = document.getElementById('mod-email').value; if(e) db.ref('mods').push(e); }

    function pushTarget() { const u = document.getElementById('target-url').value; if(u.includes('http')) db.ref('targets').push({ url: u }); }

    function loadRadar() {
        db.ref('targets').on('value', s => {
            const list = document.getElementById('targets-radar');
            list.innerHTML = ""; let i = 1;
            s.forEach(t => {
                const b = document.createElement('div'); b.className = 'target-btn';
                b.innerHTML = `⚔️ <b>الـهـدف رقـم [ ${i++} ]</b><br><small style="color:gray">رابط مرصود في الرادار</small>`;
                b.onclick = () => { activeLink = t.val().url; document.getElementById('view-strike').classList.add('active'); };
                list.prepend(b);
            });
        });
    }

    function strikeTikTok() { window.location.href = activeLink.replace("https://www.tiktok.com/", "snssdk1128://"); }

    function strikeGmail() {
        const msg = `Dear Safety Team, Report: ${activeLink}. Violation of international safety terms. Support ID: DZ-ELJELAD.`;
        navigator.clipboard.writeText(msg).then(() => {
            window.location.href = `mailto:feedback@tiktok.com,legal@tiktok.com,reports@tiktok.com?subject=Violation&body=${encodeURIComponent(msg)}`;
        });
    }

    function updateClock() { setInterval(() => { document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000); }
</script>
</body>
</html>
