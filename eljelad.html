<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم جيش التبليغ الجزائري</title>
    <style>
        /* تنسيق بسيط للزر */
        .logout-btn {
            background-color: #ff4d4d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h2>مرحباً بك في النظام</h2>
        <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج والعودة</button>
    </div>

    <script>
        function handleLogout() {
            // مسح بيانات الجلسة
            localStorage.removeItem("isLoggedIn");
            
            // التوجيه إلى الصفحة الرئيسية للمستودع (تجنباً لخطأ 404)
            // سيقوم هذا بنقلك إلى الجذر (Root) الخاص بموقعك على GitHub
            window.location.href = "./"; 
        }

        // التأكد من أن المستخدم مسجل دخول أصلاً
        window.onload = function() {
            if (localStorage.getItem("isLoggedIn") !== "true") {
                // إذا لم يكن مسجلاً، وجهه للصفحة الرئيسية
                window.location.href = "./";
            }
        };
    </script>
</body>
</html>
