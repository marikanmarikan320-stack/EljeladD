<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة الجلاد v18.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { --green: #006233; --white: #ffffff; --red: #d21034; --neon: #00ff41; --gold: #ffcc00; }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .army-title { font-size: 1.5rem; text-align: center; font-weight: bold; animation: algeria-flash 2.5s infinite; padding: 20px; }
        @keyframes algeria-flash { 0%, 100% { color: var(--green); text-shadow: 0 0 20px var(--green); } 33% { color: var(--white); text-shadow: 0 0 20px var(--white); } 66% { color: var(--red); text-shadow: 0 0 20px var(--red); } }
        .circular-logo { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; box-shadow: 0 0 30px var(--neon); margin: 20px auto; }
        .btn-action { background: white; color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; display: block; margin: 0 auto; }
        .view { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        .target-card { background: #111; border: 1px solid var(--neon); border-radius: 10px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid var(--neon); background: #000; color: var(--neon); }
    </style>
</head>
<body>

<div id="view-login" class="view active">
    <h1 class="army-title">منظومة جيش تبليغ الجزائر<br>بقيادة الجلاد الجزائري</h1>
    <div class="circular-logo"></div>
    <button class="btn-action" onclick="googleLogin()">دخول النظام 🛡️</button>
</div>

<div id="view-menu" class="view">
    <h2 style="color: var(--gold);">🎯 قائمة الأهداف</h2>
    <div id="admin-box" style="display:none; border: 1px dashed var(--gold); padding: 15px; margin-bottom: 20px;">
        <input type="text" id="target-url" placeholder="ضع رابط الهدف هنا...">
        <button onclick="addTarget()" style="background: var(--neon); padding: 10px; border: none; font-weight: bold;">إرسال للجنود 🚀</button>
    </div>
    <div id="targets-list"></div>
</div>

<script>
    // --- (1) إعدادات Firebase ---
    // يا قائد: يجب وضع مفتاح الـ API الخاص بك هنا لكي يعمل الزر
    const firebaseConfig = {
        apiKey: "ضع_هنا_API_KEY_الخاص_بك", 
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.appspot.com",
        appId: "ضع_هنا_APP_ID_الخاص_بك"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const OWNER = "marikanmarikan320@gmail.com";

    // --- (2) نظام الدخول ---
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((res) => {
            const user = res.user;
            if(user.email === OWNER) {
                document.getElementById('admin-box').style.display = 'block';
            }
            showView('view-menu');
            loadTargets();
        }).catch(err => alert("خطأ في الدخول: " + err.message));
    }

    // --- (3) إدارة الأهداف ---
    function addTarget() {
        const url = document.getElementById('target-url').value;
        if(url) {
            db.ref('targets').push({ url: url });
            document.getElementById('target-url').value = "";
        }
    }

    function loadTargets() {
        db.ref('targets').on('value', snap => {
            const list = document.getElementById('targets-list');
            list.innerHTML = "";
            let i = 1;
            snap.forEach(child => {
                list.innerHTML += `<div class="target-card">
                    <span>الهدف رقم ${i}</span>
                    <button onclick="alert('تم حقن الرابط: ${child.val().url}')">قصف 🎯</button>
                </div>`;
                i++;
            });
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
