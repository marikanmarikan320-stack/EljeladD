<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>واجهة تحليل الذهب</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; }
h1 { color: #FFD700; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #fff; padding: 8px; text-align: center; }
th { background-color: #222; }
button { background: #FFD700; color: #111; padding: 10px; margin: 5px; border: none; cursor: pointer; }
</style>
</head>
<body>
<h1>واجهة تحليل الذهب - لحظي</h1>
<button onclick="loadData('1m')">فريم دقيقة</button>
<button onclick="loadData('5m')">فريم 5 دقائق</button>
<button onclick="loadData('15m')">فريم 15 دقيقة</button>
<button onclick="loadData('1h')">فريم ساعة</button>
<button onclick="loadData('4h')">فريم 4 ساعات</button>

<div id="report">جارٍ تحميل البيانات...</div>

<script>
async function loadData(frame) {
    const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=${frame}&limit=5`);
    const data = await response.json();
    let html = `<h2>آخر 5 شموع - ${frame}</h2><table><tr><th>الفتح</th><th>الإغلاق</th><th>الأعلى</th><th>الأدنى</th><th>الحجم</th></tr>`;
    data.forEach(candle => {
        html += `<tr><td>${candle[1]}</td><td>${candle[4]}</td><td>${candle[2]}</td><td>${candle[3]}</td><td>${candle[5]}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById("report").innerHTML = html;
}
loadData('5m');
</script>
</body>
</html>
