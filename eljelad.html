<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق منعة الرقمي</title>
    <style>
        /* الأساس السينمائي */
        body { margin: 0; padding: 0; width: 100%; height: 100vh; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', Roboto, sans-serif; }

        /* الخلفية التكنولوجية العمق */
        .deep-space-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #001f3f, #000);
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000');
            background-size: cover; filter: blur(20px) brightness(0.3); z-index: -1;
        }

        /* البطاقة المركزية الطافية (Glassmorphism Pro) */
        .hero-card {
            width: 85%; max-width: 380px; padding: 40px 25px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 40px 60px rgba(0,0,0,0.8);
        }

        /* الشعار في المنتصف بوهج عالي */
        .hero-logo {
            width: 140px; height: 140px; border-radius: 50%;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin: 0 auto 25px; border: 4px solid #fff;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.7);
        }

        /* الطباعة الاحترافية */
        h1 { color: #fff; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #00d4ff; }
        p { color: #ccc; font-size: 15px; line-height: 1.8; margin-bottom: 30px; }

        /* الزر التفاعلي (Neumorphic Glow) */
        .cta-btn {
            width: 100%; padding: 20px; border-radius: 30px;
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: #fff; border: none; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.5);
        }
        .cta-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 123, 255, 0.7); }
    </style>
</head>
<body>

    <div class="deep-space-bg"></div>

    <div class="hero-card">
        <div class="hero-logo"></div>
        <h1>تطبيق صفحة مدينة منعة</h1>
        <p>نضع التكنولوجيا في خدمة أهلنا. منصة متطورة تضم كافة الخدمات والأخبار، مصممة خصيصاً لتكون رفيقكم الرقمي اليومي.</p>
        <button class="cta-btn">تسجيل الدخول للنظام</button>
    </div>

</body>
</html>
