<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تطبيق منظومة الجلاد v18.5 - المولد المصلح</title>
    <style>
        :root { 
            --samsung-primary: #0355d0; --war-red: #ff3b30; --cyber-green: #00ff41;
            --gold: #ffcc00; --bg: #000000; --card-bg: rgba(10, 10, 10, 0.98);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; } 

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* فيديو الهاكر الجزائري */
        #war-overlay {
            position: fixed; inset: 0; background: #000; z-index: 999999;
            display: none; align-items: center; justify-content: center;
        }
        #war-overlay video { width: 100%; height: 100%; object-fit: cover; }

        /* تأثير الدخان والاهتزاز */
        #hacker-smoke {
            position: fixed; inset: 0; background: rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(15px); z-index: 200000; display: none; pointer-events: none;
        }
        
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% {transform: translate(2px, 2px);} 50% {transform: translate(-2px, -2px);} 100% {transform: translate(0,0);} }

        .app-container {
            width: 100%; height: 100%;
            background: url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') no-repeat center/cover;
            position: relative; transition: filter 0.5s ease;
        }

        #splash-screen {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #digital-clock {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: var(--cyber-green); font-size: 3.5rem; font-weight: bold;
            text-shadow: 0 0 20px var(--cyber-green); z-index: 10;
        }

        .bottom-dock {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; padding: 0 10px; z-index: 100;
        }
        .app-icon { width: 75px; text-align: center; cursor: pointer; }
        .icon-shape {
            width: 65px; height: 65px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin-bottom: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 85vh;
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            border-radius: 40px 40px 0 0; z-index: 1000;
            padding: 30px 25px; transition: 0.5s;
            border-top: 2px solid var(--cyber-green);
        }
        .modal-sheet.active { bottom: 0; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }
        textarea {
            width: 100%; height: 160px; background: #000;
            color: var(--cyber-green); border: 1px solid var(--cyber-green);
            border-radius: 20px; padding: 15px; font-size: 12px;
        }
    </style>
</head>
<body onclick="enableAudio()">

<div id="war-overlay">
    <video id="hacker-vid" playsinline muted>
        <source src="https://v1.nitrocdn.com/fMvCqyXyIqPzTqZlXzLzYvG/assets/static/optimized/rev-5e43c16/wp-content/uploads/2022/11/Hacker-Intro.mp4" type="video/mp4">
    </video>
</div>
<div id="hacker-smoke"></div>

<div id="splash-screen">
    <div style="width:180px; height:180px; border-radius:50%; border:3px solid var(--cyber-green); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;"></div>
    <h2 style="color: var(--cyber-green); margin-top:20px;">نظام الجلاد v18.5</h2>
    <button id="entry-btn" style="display:none; background:var(--cyber-green); padding:15px 40px; border-radius:50px; font-weight:bold;" onclick="launchApp()">دخول النظام ⚔️</button>
</div>

<div class="app-container" id="main-app">
    <div id="digital-clock">00:00:00</div>
    <div class="bottom-dock">
        <div class="app-icon" onclick="openSheet('s1')"><div class="icon-shape" style="background:#0355d0;">🛡️</div></div>
        <div class="app-icon" onclick="launchSearchRadar()"><div class="icon-shape" style="background:#00ff41;">🔍</div></div>
        <div class="app-icon" onclick="openSheet('s2')"><div class="icon-shape" style="background:#ff3b30;">🎯</div></div>
        <div class="app-icon" onclick="openSheet('s3')"><div class="icon-shape" style="background:#ffcc00;">☣️</div></div>
    </div>
</div>

<div class="modal-sheet" id="s1">
    <button class="btn-action" style="background: var(--samsung-primary); color: white;" onclick="triggerWar('https://www.tiktok.com/legal/report/feedback')">إطلاق القذيفة</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s2">
    <button class="btn-action" style="background: var(--war-red); color: white;" onclick="triggerWar('https://www.tiktok.com/@ELJELAD_DZ')">بدء الاقتحام</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s3">
    <textarea id="mail-text" readonly></textarea>
    <button class="btn-action" style="background: var(--gold);" onclick="generateMassiveReport()">🔄 توليد ونسخ (600 حرف)</button>
    <button class="btn-action" style="background: white;" onclick="triggerWar('mailto:legal@tiktok.com')">🚀 قصف الجيميلات</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">رجوع</button>
</div>

<script>
    // نظام الصوت
    const bgMusic = new Audio('https://archive.org/download/boyka-music-remix/boyka.mp3');
    bgMusic.loop = true;
    const gunSnd = new Audio('https://www.soundjay.com/mechanical/gun-shot-01.mp3');
    const clickSnd = new Audio('https://www.soundjay.com/mechanical/mechanical-clunk-1.mp3');

    function enableAudio() { 
        // لفتح صلاحية الصوت في المتصفح
        if(bgMusic.paused) bgMusic.play().catch(()=>{}); 
    }

    function launchApp() {
        if(navigator.vibrate) navigator.vibrate(100);
        bgMusic.play();
        document.getElementById('splash-screen').style.display = 'none';
        updateClock();
    }

    function triggerWar(url) {
        gunSnd.play();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 2000]);
        
        document.getElementById('war-overlay').style.display = 'flex';
        document.getElementById('hacker-vid').play();
        document.getElementById('hacker-smoke').style.display = 'block';
        document.body.classList.add('shake');

        setTimeout(() => {
            window.location.href = url;
        }, 3000);
    }

    function openSheet(id) { 
        clickSnd.play();
        if(navigator.vibrate) navigator.vibrate(50);
        document.getElementById(id).classList.add('active'); 
    }

    function closeSheet() { 
        document.querySelectorAll('.modal-sheet').forEach(s => s.classList.remove('active')); 
    }

    function generateMassiveReport() {
        if(navigator.vibrate) navigator.vibrate(50);
        let r = "URGENT_REPORT: Illegal activities detected on account. ";
        while(r.length < 600) { r += "This user violates community standards and legal terms. "; }
        document.getElementById('mail-text').value = r;
        navigator.clipboard.writeText(r);
    }

    function launchSearchRadar() {
        triggerWar('https://www.tiktok.com/search?q=ELJELAD_DZ');
    }

    function updateClock() {
        document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB');
        setTimeout(updateClock, 1000);
    }

    setTimeout(() => { document.getElementById('entry-btn').style.display = 'block'; }, 1500);
</script>
</body>
</html>
