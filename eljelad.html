<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحليل الذهب</title>
<style>
body {background:#111;color:white;font-family:Arial;text-align:center;}
h2 {margin-top:20px;}
.table {margin:auto;border-collapse:collapse;}
.table th, .table td {padding:8px 12px;border:1px solid gold;}
button {padding:10px;margin:5px;background:gold;color:black;border:none;cursor:pointer;}
</style>
</head>
<body>
<h2>لوحة تحليل الذهب اللحظي</h2>
<button onclick="fetchData()">تحديث التحليل</button>
<table class="table" id="gold_table">
<thead>
<tr>
<th>الفريم</th><th>الإشارة</th><th>السعر</th><th>ستوب لوس</th><th>هدف</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function fetchData(){
    const tbody = document.querySelector("#gold_table tbody");
    tbody.innerHTML = "";
    const response = await fetch("http://127.0.0.1:5000/data");
    const data = await response.json();
    data.forEach(item=>{
        const row = `<tr>
            <td>${item.interval}</td>
            <td>${item.signal}</td>
            <td>${item.price}</td>
            <td>${item.stop}</td>
            <td>${item.take}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>
</body>
</html>
