<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة</title>
    <style>
        /* الأساس: واجهة سامسونج One UI */
        body { margin: 0; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* الخلفية المضببة (اليد) */
        .bg-layer { position: absolute; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=1000&auto=format&fit=crop') center/cover; filter: blur(15px) brightness(0.3); z-index: -1; }

        /* بطاقة التطبيق (One UI Card) */
        .card {
            width: 85%; max-width: 350px; padding: 30px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: white; position: relative;
            /* حواف التنين الناري (معدلة لتناسب One UI) */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* حواف التنين الناري الدوارة حول البطاقة */
        .card::before {
            content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 43px; z-index: -1;
            background: linear-gradient(45deg, #ff0055, #00d4ff, #ffcc00, #ff0055);
            background-size: 400%; animation: fireFlow 4s linear infinite;
        }
        @keyframes fireFlow { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

        /* الشعار (دائرة سامسونج الأنيقة) */
        .logo-circle {
            width: 130px; height: 130px; border-radius: 35px; /* زوايا منحنية One UI */
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin: 0 auto 20px; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #fff; }
        p { color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.6; }

        /* زر سامسونج العصري */
        .ui-btn {
            background: #ffffff; color: #000; border: none;
            padding: 16px 40px; border-radius: 20px; font-weight: bold;
            margin-top: 25px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,255,255,0.3);
        }
        .ui-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="card">
    <div class="logo-circle"></div>
    <h1>تطبيق مدينة منعة - ولاية باتنة</h1>
    <p>واجهة رقمية متطورة تضع خدمات بلدتنا في متناول يدك بكل أناقة وسرعة.</p>
    <button class="ui-btn">تسجيل الدخول</button>
</div>

</body>
</html>
