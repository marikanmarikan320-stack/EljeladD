<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v26.3 - ترسانة الأهداف</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

    <style>
        :root { 
            --samsung-primary: #0355d0; --war-red: #ff3b30; --cyber-green: #00ff41;
            --gold: #ffcc00; --bg: #000000; --card-bg: rgba(10, 10, 10, 0.98);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; } 

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* أضواء حواف الهاتف */
        .edge-lighting {
            position: fixed; inset: 0; pointer-events: none; z-index: 10000;
            box-shadow: inset 0 0 20px var(--cyber-green);
            animation: pulse-edge 2s infinite;
        }
        @keyframes pulse-edge { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* شاشة الترحيب والدخول */
        #splash-screen {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .flag-text {
            font-size: 1.4rem; font-weight: bold; margin-bottom: 25px;
            animation: flag-pulse 2s infinite;
        }
        @keyframes flag-pulse {
            0% { color: white; } 33% { color: #006233; } 66% { color: #d21034; }
        }

        .circular-logo {
            width: 140px; height: 140px; border-radius: 50%;
            border: 3px solid var(--cyber-green);
            background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;
            box-shadow: 0 0 30px var(--cyber-green); margin-bottom: 30px;
        }

        /* واجهة الأهداف (شكل تطبيقات الهاتف) */
        #main-app { display: none; width: 100%; height: 100%; position: relative; padding: 20px; overflow-y: auto; }
        
        .arsenal-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            padding-top: 100px; justify-items: center;
        }

        .target-app-icon {
            width: 85px; text-align: center; cursor: pointer;
            animation: icon-float 3s infinite ease-in-out;
        }
        @keyframes icon-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .target-shape {
            width: 70px; height: 70px; border-radius: 20px;
            background: linear-gradient(135deg, #111, #222);
            border: 2px solid var(--war-red);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 8px;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        /* لوحة القائد المركزية */
        #commander-panel {
            background: rgba(10, 10, 10, 0.9); border: 2px solid var(--samsung-primary);
            border-radius: 25px; padding: 15px; margin-bottom: 30px; display: none;
        }

        /* واجهة الترسانة الحربية (Nofication Sheet) */
        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 85vh;
            background: var(--card-bg); 
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg');
            background-size: cover; border-radius: 40px 40px 0 0; z-index: 10001;
            padding: 30px 25px; transition: 0.5s cubic-bezier(0, 0, 0.2, 1);
            border-top: 3px solid var(--cyber-green);
        }
        .modal-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #444; border-radius: 10px; margin: -10px auto 20px; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; cursor: pointer;
        }
        textarea { width: 100%; height: 150px; background: #000; color: var(--cyber-green); border: 1px solid var(--cyber-green); border-radius: 15px; padding: 10px; font-family: monospace; font-size: 12px; }

        #matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.1; }
        #digital-clock { position: absolute; top: 40px; width: 100%; text-align: center; color: var(--cyber-green); font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="edge-lighting"></div>

<div id="splash-screen">
    <div class="flag-text">منظومة جيش تبليغ الجزائري<br>بقيادة الجلاد الجزائري</div>
    <div class="circular-logo"></div>
    <button id="login-btn" style="background:white; color:black; padding:15px 40px; border-radius:50px; font-weight:bold; border:none; display:flex; align-items:center; gap:10px;" onclick="login()">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> تسجيل الدخول عبر Google
    </button>
</div>

<div class="main-app" id="main-app">
    <div id="digital-clock">00:00:00</div>
    <canvas id="matrix-bg"></canvas>

    <div id="commander-panel">
        <h4 style="margin:0 0 10px; color:var(--samsung-primary);">إرسال إحداثيات هدف جديد 🚀</h4>
        <input type="text" id="target-input" placeholder="ضع رابط تيك توك هنا..." style="width:100%; padding:12px; border-radius:15px; background:#000; color:white; border:1px solid #333;">
        <button onclick="pushTarget()" style="width:100%; padding:12px; background:var(--samsung-primary); color:white; border-radius:15px; border:none; margin-top:10px;">تعميم الهدف للجيش</button>
    </div>

    <div class="arsenal-grid" id="arsenal-list">
        </div>
</div>

<div class="modal-sheet" id="war-ui">
    <div class="sheet-handle" onclick="closeSheet()"></div>
    <div class="circular-logo" style="width:80px; height:80px;"></div>
    
    <div id="ops-buttons">
        <div style="background:rgba(0,255,65,0.05); border:1px dashed var(--cyber-green); padding:10px; border-radius:15px; margin-bottom:15px; font-size:14px;">
            👊 <b>الهدف محاصر!</b><br>استخدم الأسلحة أدناه لتدمير الحساب.
        </div>
        
        <button class="btn-action" style="background: var(--samsung-primary); color: white;" onclick="strikeAction('https://www.tiktok.com/legal/report/feedback')">🛡️ البوابة القانونية</button>
        <button class="btn-action" style="background: var(--war-red); color: white;" onclick="launchNativeTikTok()">🎯 اقتحام مباشر</button>
        <button class="btn-action" style="background: var(--gold); color: black;" onclick="showGenerator()">☣️ المولد النووي</button>
    </div>

    <div id="generator-ui" style="display:none;">
        <textarea id="mail-text" readonly></textarea>
        <button class="btn-action" style="background: var(--gold); color: black; margin-top:10px;" onclick="generateMassiveReport()">🔄 توليد شفرة</button>
        <button class="btn-action" style="background: white; color: black;" onclick="sendFinalEmail()">🚀 قصف الجيميلات</button>
        <button onclick="hideGenerator()" style="width:100%; background:none; border:none; color:grey;">رجوع</button>
    </div>
    
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey; margin-top:10px;">تراجع للترسانة</button>
</div>

<script>
    // الإعدادات المسحوبة من كودك
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com";
    let finalTarget = "";

    const boomSnd = new Audio('https://www.soundjay.com/mechanical/gun-shot-01.mp3');

    // الدخول والمزامنة
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(user.email === MASTER) document.getElementById('commander-panel').style.display = 'block';
            loadTargets();
            initMatrix();
            updateClock();
        }
    });

    // وظائف القائد
    function pushTarget() {
        const u = document.getElementById('target-input').value;
        if(u.includes('http')) {
            db.ref('targets').push({ url: u, time: Date.now() });
            document.getElementById('target-input').value = "";
            alert("تم إرسال الهدف للترسانة!");
        }
    }

    // بناء واجهة التطبيقات (الترسانة)
    function loadTargets() {
        db.ref('targets').limitToLast(12).on('value', s => {
            const list = document.getElementById('arsenal-list');
            list.innerHTML = "";
            let i = 1;
            s.forEach(t => {
                const icon = document.createElement('div');
                icon.className = 'target-app-icon';
                icon.innerHTML = `
                    <div class="target-shape">🎯</div>
                    <div style="font-size:12px; font-weight:bold;">الهدف ${i}</div>
                `;
                icon.onclick = () => openWarUI(t.val().url);
                list.prepend(icon);
                i++;
            });
        });
    }

    function openWarUI(url) {
        boomSnd.play();
        finalTarget = url;
        document.getElementById('war-ui').classList.add('active');
        document.getElementById('main-app').style.filter = 'blur(10px)';
    }

    function closeSheet() {
        document.getElementById('war-ui').classList.remove('active');
        document.getElementById('main-app').style.filter = 'none';
        hideGenerator();
    }

    // آليات الحرب
    function strikeAction(url) { window.location.href = url; }

    function launchNativeTikTok() {
        const cleanURL = finalTarget.replace('https://', '').replace('http://', '');
        window.location.href = `intent://${cleanURL}#Intent;package=com.zhiliaoapp.musically;scheme=https;end`;
    }

    function showGenerator() {
        document.getElementById('ops-buttons').style.display = 'none';
        document.getElementById('generator-ui').style.display = 'block';
        generateMassiveReport();
    }

    function hideGenerator() {
        document.getElementById('ops-buttons').style.display = 'block';
        document.getElementById('generator-ui').style.display = 'none';
    }

    function generateMassiveReport() {
        const report = `URGENT REPORT: Account ${finalTarget} is violating community standards. Requesting immediate review and suspension for coordinated harassment and policy violations. ID: DZ-ELJELAD-${Math.random().toString(36).substring(7).toUpperCase()}`;
        document.getElementById('mail-text').value = report.repeat(3);
        navigator.clipboard.writeText(document.getElementById('mail-text').value);
    }

    function sendFinalEmail() {
        const admins = "legal@tiktok.com,feedback@tiktok.com,reports@tiktok.com";
        const body = encodeURIComponent(document.getElementById('mail-text').value);
        window.location.href = `mailto:${admins}?subject=URGENT_VIOLATION_REPORT&body=${body}`;
    }

    // أدوات الواجهة
    function updateClock() {
        document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB');
        setTimeout(updateClock, 1000);
    }

    function initMatrix() {
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 15)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    }
</script>
</body>
</html>
