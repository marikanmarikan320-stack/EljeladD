<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة</title>
    <style>
        /* شاشة كاملة */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* خلفية تكنولوجية ناعمة */
        .full-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            z-index: -1;
        }

        /* الحاوية الأساسية */
        .app-wrapper {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px; box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,20,40,0.4) 100%);
        }

        /* العنوان في الأعلى */
        h1 { font-size: 22px; margin-top: 20px; text-align: center; color: #e0e0e0; font-weight: 300; }

        /* الشعار */
        .logo-box {
            width: 160px; height: 160px; margin: 0 auto;
            border-radius: 40px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
        }

        /* معلومات التطبيق */
        .info-box { text-align: center; padding: 20px; }
        .info-box p { color: #aaa; font-size: 15px; line-height: 1.8; }

        /* زر التسجيل */
        .action-btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: #ffffff; color: #000; font-weight: bold; font-size: 16px;
            margin-bottom: 30px; cursor: pointer; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="full-bg"></div>

<div class="app-wrapper">
    <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
    
    <div class="logo-box"></div>
    
    <div class="info-box">
        <p>نقدم لكم واجهة تكنولوجية متطورة تخدم سكان بلدتنا. هدفنا تسهيل الوصول للخدمات، الأرقام العاجلة، والأخبار المحلية بضغطة زر واحدة في منصة آمنة ومستقرة.</p>
    </div>

    <button class="action-btn" onclick="alert('جارٍ ربط نظام Firebase...')">تسجيل الدخول</button>
</div>

</body>
</html>
