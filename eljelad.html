<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الجلاد - الهجوم الأوتوماتيكي</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .main-frame { border: 3px double #ff0000; padding: 30px; border-radius: 25px; background: #050505; box-shadow: 0 0 40px #ff0000; }
        .status-box { background: #111; padding: 15px; margin: 20px 0; border-radius: 10px; border-left: 5px solid #00ff00; color: #00ff00; font-family: monospace; }
        .timer-display { font-size: 3rem; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #ff0000; }
        .btn-start { background: #ff0000; color: #fff; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.02); background: #b00; }
        #log { font-size: 0.8rem; text-align: left; height: 120px; overflow-y: auto; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-frame">
    <h1>🦅 الجـلاد - الـقنص الآلـي</h1>
    <p>سيقوم النظام بفتح تيك توك ونسخ البلاغ آلياً في كل دورة</p>
    
    <div class="timer-display" id="timer">--</div>
    <div class="status-box" id="currentStrike">الضربة: 0 / 20</div>

    <button id="startBtn" class="btn-start" onclick="initiateAutoAttack()">⚡ تفعيل الهجوم الأوتوماتيكي</button>

    <div id="log">>> المنظومة بانتظار أمر البدء...</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('target');
    const timerDisplay = document.getElementById('timer');
    const strikeDisplay = document.getElementById('currentStrike');
    const logDiv = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');

    let strikeCount = 0;
    const maxStrikes = 20;

    const reportTexts = [
        "OFFICIAL REPORT: Severe violation detected. This live broadcast is promoting hate speech and inciting violence against protected groups. This is a direct breach of Community Guidelines Section 4. We demand an immediate manual review and a permanent hardware ban for this user to ensure platform safety. Action is required immediately.",
        "URGENT SAFETY COMPLAINT: Promoting extremist ideologies and hateful conduct. The host is using harmful language targeting specific communities. This broadcast must be terminated immediately under safety protocol 992-B. As a verified member, I request a full account suspension and investigation into this activity.",
        "CRITICAL VIOLATION: Hate speech and coordinated harassment in progress. This content endangers the community and violates safety standards. I request immediate takedown and a permanent restriction on this creator's ability to go live. High-priority enforcement is mandatory for this report."
    ];

    async function notifyTelegram(msg) {
        const botToken = "8585074322:AAE9EsEABVzsDiRVKY8kXq940g7CBNysjkQ";
        const chatId = "6113400824";
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=6113400824&text=${encodeURIComponent(msg)}`);
    }

    function initiateAutoAttack() {
        startBtn.style.display = 'none';
        logDiv.innerHTML += `<br>🚀 تم تشغيل "الإعصار".. لا تغلق هذه الصفحة!`;
        executeStrike();
    }

    async function executeStrike() {
        if (strikeCount >= maxStrikes) {
            timerDisplay.innerText = "🏁";
            logDiv.innerHTML += `<br>🏁 تم الانتهاء من جميع الضربات بنجاح.`;
            return;
        }

        strikeCount++;
        strikeDisplay.innerText = `الضربة: ${strikeCount} / 20`;
        
        // 1. اختيار نص عشوائي ونسخه للحافظة
        const randomText = reportTexts[Math.floor(Math.random() * reportTexts.length)] + " [REF-" + Math.random().toString(36).substring(7) + "]";
        try {
            await navigator.clipboard.writeText(randomText);
            logDiv.innerHTML += `<br>📋 الضربة ${strikeCount}: تم نسخ النص الرسمي آلياً.`;
        } catch(e) { console.log("Clipboard Error"); }

        // 2. إشعار البوت
        await notifyTelegram(`🔥 <b>الضربة (${strikeCount}/20)</b>\nالنص جاهز في حافظة هاتفك.. قم باللصق الآن!`);

        // 3. فتح تيك توك على قسم الكراهية
        const targetId = target ? target.split('/').pop().split('?')[0] : "";
        const deepLink = `snssdk1128://report?object_id=${targetId}&target_id=${targetId}&type=live_room&reason=1001`;
        
        logDiv.innerHTML += `<br>📲 جاري فتح واجهة البلاغ...`;
        window.location.href = deepLink;

        // 4. بدء العد التنازلي للضربة التالية (مثلاً كل 45 ثانية)
        let timeLeft = Math.floor(Math.random() * (60 - 40 + 1)) + 40; 
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                executeStrike(); // تكرار العملية أوتوماتيكياً
            }
        }, 1000);
    }
</script>
</body>
</html>
