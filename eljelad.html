<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مدينة منعة - ولاية باتنة</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: new Date()
                });
                alert("مرحباً بك يا " + user.displayName);
                location.reload();
            } catch (error) { alert("خطأ: " + error.message); }
        };
    </script>
    <style>
        /* CSS الخاص بالهيبة والواجهة الاحترافية */
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* الخلفية التكنولوجية */
        .app-bg { position: absolute; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000') center/cover; filter: brightness(0.2) blur(5px); z-index: -1; }

        /* واجهة الترحيب */
        #splash-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index: 1000; transition: 1s; }
        .logo-main { width: 150px; height: 150px; border-radius: 50%; background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover; border: 4px solid #fff; box-shadow: 0 0 40px #00d4ff; margin-bottom: 20px; }
        
        /* واجهة تسجيل الدخول */
        #login-page { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { width: 85%; max-width: 350px; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-google { width: 100%; padding: 15px; background: #fff; color: #000; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-main"></div>
        <h1 style="color:#ffcc00">تطبيق مدينة منعة</h1>
        <p style="padding: 0 30px; text-align: center;">جسرك الرقمي لخدمات وأخبار مدينتنا.</p>
    </div>

    <div id="login-page">
        <div class="app-bg"></div>
        <div class="login-card">
            <div class="logo-main" style="width:100px; height:100px;"></div>
            <h2>دخول المنظومة</h2>
            <input type="email" placeholder="البريد الإلكتروني" style="width:100%; padding:15px; border-radius:10px; margin-bottom:10px; border:none;">
            <input type="password" placeholder="كلمة المرور" style="width:100%; padding:15px; border-radius:10px; border:none;">
            <button class="btn-google" onclick="loginWithGoogle()">تسجيل الدخول بواسطة Google</button>
        </div>
    </div>

    <script>
        setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; 
        setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1000); }, 5000);
    </script>
</body>
</html>
