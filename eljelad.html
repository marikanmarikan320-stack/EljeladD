<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق منعة</title>
    <style>
        /* ملء الشاشة بالكامل */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        .full-screen-bg {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=1000&auto=format&fit=crop') center/cover;
            filter: blur(8px) brightness(0.4); /* تأثير اليد التي تحمل الهاتف مع التضبيب */
            position: absolute; z-index: -1;
        }

        .container {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
        }

        /* تأثير التنين الناري الدوار */
        .dragon-frame {
            position: relative; width: 95%; max-width: 400px;
            padding: 4px; border-radius: 30px;
            background: linear-gradient(0deg, #ff0055, #00d4ff, #ffcc00, #ff0055);
            background-size: 400% 400%;
            animation: dragonMove 3s linear infinite;
        }
        @keyframes dragonMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .content {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            padding: 40px 20px; border-radius: 26px; text-align: center; color: white;
        }

        .logo {
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid #fff;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin: 0 auto 20px; box-shadow: 0 0 30px #ff0055;
        }

        h1 { color: #ffcc00; margin-bottom: 10px; font-size: 20px; text-shadow: 0 0 10px #ff0000; }
        .login-btn {
            background: #ff0055; color: white; border: none; padding: 15px 50px;
            border-radius: 50px; margin-top: 30px; font-weight: bold;
            box-shadow: 0 0 20px #ff0055; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="full-screen-bg"></div>

<div class="container">
    <div class="dragon-frame">
        <div class="content">
            <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
            <div class="logo"></div>
            <p>مرحباً بكم في بوابتكم المحلية لخدمة أهالينا. تطبيق متكامل بين أيديكم.</p>
            <button class="login-btn">تسجيل الدخول</button>
        </div>
    </div>
</div>

</body>
</html>
