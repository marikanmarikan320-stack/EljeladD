<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة</title>
    <style>
        :root { --glow-color: #ff0055; }
        body {
            margin: 0; padding: 0; background: #050505; color: white;
            font-family: 'Arial', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* الإطار المتوهج (تأثير التنين الناري) */
        .glow-border {
            position: relative; width: 90%; max-width: 380px; padding: 3px;
            background: linear-gradient(45deg, #ff0055, #00d4ff, #ffcc00, #ff0055);
            background-size: 400%; border-radius: 25px;
            animation: dragonFire 5s linear infinite;
        }
        @keyframes dragonFire { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

        .content {
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 22px; text-align: center;
        }

        .logo-circle {
            width: 140px; height: 140px; border-radius: 50%;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin: 0 auto 20px;
            border: 4px solid #fff;
            box-shadow: 0 0 20px #ff0055, 0 0 40px #00d4ff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        h1 { font-size: 22px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; margin-bottom: 15px; }
        p { color: #ddd; font-size: 14px; line-height: 1.5; }

        .login-btn {
            background: transparent; color: #fff;
            padding: 15px 30px; border: 2px solid #00d4ff;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
            box-shadow: 0 0 15px #00d4ff;
        }
        .login-btn:hover { background: #00d4ff; box-shadow: 0 0 30px #00d4ff; }
    </style>
</head>
<body>

<div class="glow-border">
    <div class="content">
        <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
        <div class="logo-circle"></div>
        <p>نرحب بكل المتابعين الكرام. هذا التطبيق المحلي يخدم أهالي بلدتنا، حيث يجمع كل المعلومات والخدمات في منصة واحدة متطورة.</p>
        <button class="login-btn" onclick="alert('جارٍ تهيئة نظام الدخول...')">تسجيل الدخول</button>
    </div>
</div>

</body>
</html>
