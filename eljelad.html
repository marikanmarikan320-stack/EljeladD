<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 400px; /* مقاس الهواتف */
            text-align: center;
            padding: 20px;
        }
        .logo-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin: 0 auto 20px;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            box-shadow: 0 0 20px #ff0055, 0 0 40px #00d4ff; /* توهج متناسق */
        }
        h1 {
            font-size: 24px;
            color: #ffcc00;
            text-shadow: 2px 2px 5px #000;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .login-btn {
            background: linear-gradient(45deg, #ff0055, #00d4ff);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
            transition: transform 0.3s;
        }
        .login-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-circle"></div>
    <h1>تطبيق مدينة منعة ولاية باتنة</h1>
    <p>يرحب بكم، هذا التطبيق هو بوابتكم المحلية لخدمة أهالي بلدتنا، حيث نضع بين أيديكم كل المعلومات والخدمات في مكان واحد.</p>
    
    <button class="login-btn" onclick="alert('جاري الانتقال لصفحة تسجيل الدخول...')">تسجيل الدخول</button>
</div>

</body>
</html>
