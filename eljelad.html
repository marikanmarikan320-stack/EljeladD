<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الجلاد - التبليغ الرسمي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #fe2c55; border-radius: 20px; padding: 20px; background: #121212; }
        .btn-real { background: #fe2c55; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #log { margin-top: 20px; color: #888; font-size: 0.9rem; text-align: right; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🦅 منظومة الجلاد (التبليغ الميداني)</h2>
    <p>هذا الوضع يفتح واجهة البلاغ الرسمية داخل تطبيق تيك توك لضمان وصول الإشعارات.</p>
    
    <div id="targetDisplay" style="color: #fe2c55; font-weight: bold; word-break: break-all;">جاري جلب الهدف...</div>

    <button class="btn-real" onclick="launchOfficialReport()">🚀 فتح واجهة البلاغ في التطبيق</button>

    <div id="log">>> بانتظار البدء...</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('target');
    const logDiv = document.getElementById('log');

    if(target) {
        document.getElementById('targetDisplay').innerText = target;
    }

    async function notifyBot(msg) {
        const botToken = "8585074322:AAE9EsEABVzsDiRVKY8kXq940g7CBNysjkQ";
        const chatId = "6113400824";
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
    }

    function launchOfficialReport() {
        if(!target) return alert("لا يوجد هدف!");

        // استخراج الـ ID الخاص بالبث أو الحساب
        const targetId = target.split('/').pop().split('?')[0];

        logDiv.innerHTML += `<br>✅ جاري توجيهك لتطبيق تيك توك...`;
        
        // بروتوكول فتح واجهة البلاغ مباشرة داخل التطبيق
        // هذه الروابط تجبر الأندرويد/آيفون على فتح التطبيق في صفحة البلاغ
        const reportIntent = `snssdk1128://report?object_id=${targetId}&target_id=${targetId}&type=live_room`;
        
        // إرسال إشعار للبوت
        notifyBot(`👤 القائد بدأ بلاغاً يدوياً رسمياً ضد: ${target}`);

        // تنفيذ الفتح
        window.location.href = reportIntent;

        // إذا لم يفتح التطبيق، نفتح نسخة الويب الرسمية للبلاغ
        setTimeout(() => {
            window.location.href = `https://www.tiktok.com/report/live?object_id=${targetId}`;
        }, 1500);
    }
</script>
</body>
</html>
