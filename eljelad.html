<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v26.0 - النسخة المدمجة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --samsung-blue: #0355d0; --algeria-green: #006233; --algeria-red: #d21034;
            --cyber-green: #00ff41; --war-gold: #ffcc00; --glass: rgba(10, 10, 10, 0.98);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* واجهات النظام */
        .view { display: none; width: 100%; height: 100%; position: absolute; inset: 0; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; background: #000; }
        .active-view { display: flex !important; }

        /* تصميم الرادار والأهداف */
        .logo-main { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--cyber-green); box-shadow: 0 0 20px var(--cyber-green); margin-bottom: 20px; background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; }
        .target-card { 
            width: 100%; max-width: 400px; background: var(--glass); border: 2px solid var(--algeria-red);
            border-radius: 20px; padding: 15px; margin-bottom: 12px; text-align: center;
            box-shadow: 0 0 10px rgba(210, 16, 52, 0.3); cursor: pointer;
        }

        /* واجهة المولد (Modal Sheet) */
        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 85vh;
            background: #000; border-radius: 40px 40px 0 0; z-index: 2000;
            padding: 30px 25px; transition: 0.5s cubic-bezier(0, 0, 0.2, 1);
            border-top: 3px solid var(--cyber-green); text-align: center;
        }
        .modal-sheet.active { bottom: 0; }
        .btn-action { width: 100%; padding: 18px; border-radius: 25px; border: none; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        textarea { width: 100%; height: 150px; background: #111; color: var(--cyber-green); border: 1px solid var(--cyber-green); border-radius: 20px; padding: 15px; font-family: monospace; font-size: 12px; margin-bottom: 15px; }
        
        /* لوحة التحكم للقائد */
        .commander-box { width: 100%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--samsung-blue); border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; margin-bottom: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="view-login" class="view active-view" style="justify-content: center;">
    <div class="logo-main"></div>
    <h2>منظومة الجلاد v26.0</h2>
    <button class="btn-action" style="background:white; color:black; max-width:300px;" onclick="login()">الدخول عبر Google 🔐</button>
</div>

<div id="view-main" class="view">
    <div class="logo-main" style="width: 70px; height: 70px;"></div>
    
    <div id="commander-ui" style="display: none; width: 100%; max-width: 400px;">
        <div class="commander-box">
            <h4 style="color: var(--samsung-blue); margin: 5px;">📊 التحكم (المسجلون: <span id="user-count">0</span>)</h4>
            <input type="text" id="target-input" placeholder="رابط الهدف الجديد...">
            <button class="btn-action" onclick="pushTarget()" style="background: var(--algeria-red); color:white; padding:10px;">تعميم الهدف 🚀</button>
        </div>
    </div>

    <h3 style="color: gray;">رادار الأهداف النشطة</h3>
    <div id="targets-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div class="modal-sheet" id="strike-sheet">
    <div style="width:80px; height:80px; border-radius:50%; border:2px solid var(--cyber-green); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; margin: 0 auto 15px;"></div>
    <h3 style="color:var(--cyber-green);">المولد النووي للهجوم</h3>
    
    <textarea id="mail-text" readonly></textarea>
    
    <button class="btn-action" style="background: var(--war-gold); color: black;" onclick="generateReport()">🔄 توليد ونسخ الشفرة</button>
    <button class="btn-action" style="background: var(--algeria-red); color: white;" onclick="launchNativeTikTok()">📍 اقتحام تيك توك</button>
    <button class="btn-action" style="background: white; color: black;" onclick="sendFinalEmail()">🚀 قصف الجيميلات</button>
    
    <button onclick="closeSheet()" style="background:none; border:none; color:grey; margin-top:10px;">تراجع للرادار</button>
</div>

<script>
    // إعدادات فايربيس الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com"; // إيميلك كقائد
    let activeLink = "";

    // إدارة الدخول
    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).set({ email: user.email, ts: Date.now() });
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').classList.add('active-view');
            
            if(user.email === MASTER) {
                document.getElementById('commander-ui').style.display = 'block';
                db.ref('users').on('value', s => document.getElementById('user-count').innerText = s.numChildren());
            }
            loadTargets();
        }
    });

    function login() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    function pushTarget() {
        const u = document.getElementById('target-input').value;
        if(u.includes('http')) {
            db.ref('targets').push({ url: u, time: Date.now() });
            document.getElementById('target-input').value = "";
        }
    }

    // عرض الأهداف في الرادار
    function loadTargets() {
        db.ref('targets').limitToLast(10).on('value', s => {
            const list = document.getElementById('targets-list');
            list.innerHTML = "";
            s.forEach(t => {
                const b = document.createElement('div');
                b.className = 'target-card';
                b.innerHTML = `⚔️ <b>اقتحام إحداثية جديدة</b><br><small style="color:gray">${t.val().url.substring(0,35)}...</small>`;
                b.onclick = () => openStrike(t.val().url);
                list.prepend(b);
            });
        });
    }

    // فتح واجهة الهجوم مباشرة
    function openStrike(url) {
        activeLink = url;
        document.getElementById('strike-sheet').classList.add('active');
        generateReport(); // توليد الكود تلقائياً عند الفتح
    }

    function closeSheet() {
        document.getElementById('strike-sheet').classList.remove('active');
    }

    // وظائف المولد المصلح
    function generateReport() {
        const report = `URGENT REPORT: Account ${activeLink} violates safety terms. Coordinated harassment and illegal content detected. Support ID: ELJELAD-${Math.floor(Math.random()*9999)}`;
        document.getElementById('mail-text').value = report;
        navigator.clipboard.writeText(report);
    }

    function launchNativeTikTok() {
        const cleanURL = activeLink.replace('https://', '').replace('http://', '');
        window.location.href = `intent://${cleanURL}#Intent;package=com.zhiliaoapp.musically;scheme=https;end`;
    }

    function sendFinalEmail() {
        const admins = "feedback@tiktok.com,legal@tiktok.com,communitymanager@tiktok.com";
        const body = encodeURIComponent(document.getElementById('mail-text').value);
        window.location.href = `mailto:${admins}?subject=Urgent Violation Report&body=${body}`;
    }
</script>
</body>
</html>
