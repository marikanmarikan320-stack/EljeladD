<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة التحكم</title>
</head>
<body>

    <div id="app">
        <h1>مرحباً بك في لوحة التحكم</h1>
        <button onclick="logout()">تسجيل الخروج</button>
    </div>

    <script>
        // دالة تسجيل الخروج
        function logout() {
            // مسح بيانات المستخدم من المتصفح
            localStorage.clear();
            
            // إعادة التوجيه إلى صفحة تسجيل الدخول (استبدل login.html بمسار صفحتك)
            window.location.href = "login.html";
        }

        // تحقق بسيط عند تحميل الصفحة للتأكد من وجود جلسة نشطة
        window.onload = function() {
            if (!localStorage.getItem("isLoggedIn")) {
                window.location.href = "login.html";
            }
        };
    </script>

</body>
</html>
