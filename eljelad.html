<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الترسانة التقنية - مدينة منعة</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, #003366 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #660033 0%, transparent 50%);
        }

        .header-section { margin-top: 40px; text-align: center; width: 100%; }
        h1 { 
            font-size: 28px; letter-spacing: 2px; color: #fff;
            text-transform: uppercase; text-shadow: 0 0 15px #00d4ff;
            margin-bottom: 30px;
        }

        .main-logo {
            width: 180px; height: 180px; border-radius: 50%;
            border: 4px solid #fff; box-shadow: 0 0 40px #00d4ff;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            margin-bottom: 30px;
        }

        .tech-data-card {
            width: 90%; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); padding: 25px;
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .tech-image {
            width: 100%; height: 120px; border-radius: 20px;
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=600') center/cover;
            opacity: 0.6; margin-bottom: 15px;
        }

        .cta-btn {
            width: 90%; padding: 20px; border-radius: 20px;
            background: #fff; color: #000; font-weight: bold;
            font-size: 18px; border: none; cursor: pointer;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>تطبيق مدينة منعة - ولاية باتنة</h1>
        <div class="main-logo"></div>
    </div>

    <div class="tech-data-card">
        <div class="tech-image"></div>
        <p style="font-size: 16px; line-height: 1.7;">أهلاً بكم في المنصة الرقمية الرسمية. تم تصميم هذا التطبيق ليكون الجسر التقني الذي يربطكم بخدمات بلدتنا، من أرقام المؤسسات إلى الأخبار العاجلة، كل ذلك في واجهة ذكية ومستقرة.</p>
    </div>

    <button class="cta-btn" onclick="alert('جارٍ تهيئة الاتصال...')">تسجيل الدخول للنظام</button>

</body>
</html>
