<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v26.4 - ترسانة العمليات</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

    <style>
        :root { 
            --samsung-primary: #0355d0; --war-red: #ff3b30; --cyber-green: #00ff41;
            --gold: #ffcc00; --bg: #000000; --card-bg: rgba(10, 10, 10, 0.98);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; } 

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* أضواء حواف الهاتف */
        .edge-lighting {
            position: fixed; inset: 0; pointer-events: none; z-index: 10000;
            box-shadow: inset 0 0 20px var(--cyber-green);
            animation: pulse-edge 2s infinite;
        }
        @keyframes pulse-edge { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* شاشة الترحيب */
        #splash-screen {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .circular-logo {
            width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid var(--cyber-green);
            background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;
            box-shadow: 0 0 30px var(--cyber-green); margin-bottom: 20px;
        }

        /* واجهة الترسانة (الأيقونات) */
        .arsenal-view { display: none; width: 100%; height: 100%; position: relative; padding: 20px; overflow-y: auto; z-index: 10; }
        
        .arsenal-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;
            padding-top: 120px; justify-items: center;
        }

        .app-icon-box { width: 80px; text-align: center; cursor: pointer; transition: 0.2s; }
        .app-icon-box:active { transform: scale(0.9); }

        .icon-main-shape {
            width: 70px; height: 70px; border-radius: 22px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            border: 2px solid var(--war-red);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin-bottom: 8px;
            box-shadow: 0 8px 15px rgba(255, 59, 48, 0.3);
        }

        /* واجهة العمليات الحربية (التي تفتح عند الضغط على الهدف) */
        .app-container {
            display: none; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') no-repeat center/cover;
            position: fixed; inset: 0; z-index: 20000; animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #digital-clock { position: absolute; top: 40px; width: 100%; text-align: center; color: var(--cyber-green); font-size: 3rem; font-weight: bold; }
        
        .bottom-dock {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; padding: 0 10px;
        }

        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 80vh;
            background: var(--card-bg); border-radius: 40px 40px 0 0; z-index: 30000;
            padding: 30px 25px; transition: 0.5s ease; border-top: 2px solid var(--cyber-green);
        }
        .modal-sheet.active { bottom: 0; }

        .btn-action { width: 100%; padding: 18px; border-radius: 25px; border: none; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        textarea { width: 100%; height: 160px; background: #000; color: var(--cyber-green); border: 1px solid var(--cyber-green); border-radius: 20px; padding: 15px; }

        #matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.1; }
        
        /* لوحة القائد */
        #commander-panel {
            background: rgba(10, 10, 10, 0.9); border: 2px solid var(--samsung-primary);
            border-radius: 25px; padding: 15px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="edge-lighting"></div>

<div id="splash-screen">
    <div style="color:white; font-weight:bold; margin-bottom:20px; font-size:1.2rem;">منظومة جيش تبليغ الجزائري<br>بقيادة الجلاد الجزائري</div>
    <div class="circular-logo"></div>
    <button id="login-btn" style="background:white; color:black; padding:15px 40px; border-radius:50px; font-weight:bold; border:none;" onclick="login()">تسجيل الدخول عبر Google 🔐</button>
</div>

<div class="arsenal-view" id="arsenal-page">
    <div id="commander-panel" style="display:none;">
        <input type="text" id="target-input" placeholder="رابط هدف جديد..." style="width:100%; padding:12px; border-radius:15px; background:#000; color:white; border:1px solid #333; margin-bottom:10px;">
        <button onclick="pushTarget()" style="width:100%; padding:10px; background:var(--samsung-primary); color:white; border-radius:15px; border:none;">إرسال للترسانة 🚀</button>
    </div>
    
    <div class="arsenal-grid" id="arsenal-list">
        </div>
</div>

<div class="app-container" id="main-app">
    <div id="digital-clock">00:00:00</div>
    <canvas id="matrix-bg"></canvas>
    
    <button onclick="backToArsenal()" style="position:absolute; top:20px; left:20px; background:rgba(255,255,255,0.1); border:none; color:white; padding:10px 20px; border-radius:20px; z-index:100;">✕ إغلاق الترسانة</button>

    <div class="bottom-dock">
        <div class="app-icon-box" onclick="openSheet('s1')">
            <div class="icon-main-shape" style="background: linear-gradient(135deg, #0a74da, #0355d0); border:none;">🛡️</div>
            <div class="app-name">البوابة</div>
        </div>
        <div class="app-icon-box" onclick="launchSearchRadar()">
            <div class="icon-main-shape" style="background: linear-gradient(135deg, #00ff41, #008f11); border:none;">🔍</div>
            <div class="app-name">الرادار</div>
        </div>
        <div class="app-icon-box" onclick="openSheet('s2')">
            <div class="icon-main-shape" style="background: linear-gradient(135deg, #ff5e57, #ff3b30); border:none;">🎯</div>
            <div class="app-name">اقتحام</div>
        </div>
        <div class="app-icon-box" onclick="openSheet('s3')">
            <div class="icon-main-shape" style="background: linear-gradient(135deg, #ffcc00, #ff9500); border:none;">☣️</div>
            <div class="app-name">المولد</div>
        </div>
    </div>
</div>

<div class="modal-sheet" id="s1">
    <div class="circular-logo" style="width:80px; height:80px;"></div>
    <div class="instruction-frame">أرسل القذيفة القانونية الآن للهدف المحدد.</div>
    <button class="btn-action" style="background: var(--samsung-primary); color: white;" onclick="strikeAction('https://www.tiktok.com/legal/report/feedback')">إطلاق القذيفة 🛡️</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s2">
    <div class="circular-logo" style="width:80px; height:80px;"></div>
    <div class="instruction-frame">سيتم فتح الحساب في تطبيق تيك توك للاقتحام اليدوي.</div>
    <button class="btn-action" style="background: var(--war-red); color: white;" onclick="launchNativeTikTok()">بدء الاقتحام 🎯</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s3">
    <textarea id="mail-text" readonly></textarea>
    <button class="btn-action" style="background: var(--gold); color: black; margin-top:10px;" onclick="generateMassiveReport()">🔄 توليد شفرة نووية</button>
    <button class="btn-action" style="background: white; color: black;" onclick="sendFinalEmail()">🚀 قصف الجيميلات</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:grey;">رجوع</button>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com";
    let finalTarget = "";

    const boomSnd = new Audio('https://www.soundjay.com/mechanical/gun-shot-01.mp3');

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('arsenal-page').style.display = 'block';
            if(user.email === MASTER) document.getElementById('commander-panel').style.display = 'block';
            loadTargets();
            updateClock();
            initMatrix();
        }
    });

    function pushTarget() {
        const u = document.getElementById('target-input').value;
        if(u.includes('http')) {
            db.ref('targets').push({ url: u, time: Date.now() });
            document.getElementById('target-input').value = "";
        }
    }

    function loadTargets() {
        db.ref('targets').on('value', s => {
            const list = document.getElementById('arsenal-list');
            list.innerHTML = "";
            let i = 1;
            s.forEach(t => {
                const icon = document.createElement('div');
                icon.className = 'app-icon-box';
                icon.innerHTML = `<div class="icon-main-shape">🎯</div><div style="font-size:12px;">الهدف ${i}</div>`;
                icon.onclick = () => launchWarUI(t.val().url);
                list.prepend(icon);
                i++;
            });
        });
    }

    // الدخول لواجهة العمليات (الواجهة التي طلبتها)
    function launchWarUI(url) {
        boomSnd.play();
        finalTarget = url;
        document.getElementById('main-app').style.display = 'block';
    }

    function backToArsenal() {
        document.getElementById('main-app').style.display = 'none';
    }

    function openSheet(id) {
        document.getElementById(id).classList.add('active');
        if(id === 's3') generateMassiveReport();
    }

    function closeSheet() {
        document.querySelectorAll('.modal-sheet').forEach(s => s.classList.remove('active'));
    }

    function launchNativeTikTok() {
        const cleanURL = finalTarget.replace('https://', '').replace('http://', '');
        window.location.href = `intent://${cleanURL}#Intent;package=com.zhiliaoapp.musically;scheme=https;end`;
    }

    function launchSearchRadar() {
        const username = finalTarget.includes('@') ? finalTarget.split('@')[1].split('/')[0] : "ELJELAD_DZ";
        window.location.href = `intent://search?keyword=${username}#Intent;package=com.zhiliaoapp.musically;scheme=snssdk1233;end`;
    }

    function generateMassiveReport() {
        const report = `URGENT: Violation report for account ${finalTarget}. Coordinated harassment and safety breach detected. ID: DZ-${Math.random().toString(36).substring(7).toUpperCase()}`;
        document.getElementById('mail-text').value = report.repeat(4);
    }

    function sendFinalEmail() {
        const admins = "legal@tiktok.com,feedback@tiktok.com,reports@tiktok.com";
        const body = encodeURIComponent(document.getElementById('mail-text').value);
        window.location.href = `mailto:${admins}?subject=URGENT_REPORT&body=${body}`;
    }

    function strikeAction(url) { window.location.href = url; }

    function updateClock() {
        document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB');
        setTimeout(updateClock, 1000);
    }

    function initMatrix() {
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 15)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    }
</script>
</body>
</html>
