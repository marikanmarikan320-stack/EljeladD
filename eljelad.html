<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحليل الذهب</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
button {
    padding:10px;
    margin:5px;
    background:gold;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>لوحة تحليل الذهب اللحظي</h2>

<div id="tradingview_chart"></div>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 600,
  "symbol": "OANDA:XAUUSD",
  "interval": "5",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "ar",
  "toolbar_bg": "#111",
  "enable_publishing": false,
  "hide_top_toolbar": false,
  "studies": [
    "Moving Average Exponential@tv-basicstudies",
    "RSI@tv-basicstudies",
    "MACD@tv-basicstudies"
  ],
  "container_id": "tradingview_chart"
});
</script>

</body>
</html>
