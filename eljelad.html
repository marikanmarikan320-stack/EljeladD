<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مدينة منعة - One UI</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // منطق التنقل
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        };

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                showPage('main-page');
                if (user.email === "marikanmarikan320@gmail.com") {
                    document.getElementById('admin-btn').style.display = 'block';
                }
            }
        });
    </script>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .page { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 40px; padding: 30px; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .back-btn { background: none; color: #00d4ff; border: none; cursor: pointer; margin-bottom: 20px; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-page" class="page" style="display:block;">
        <div class="card" style="margin-top: 100px;">
            <div style="width:100px; height:100px; background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover; border-radius:30px; margin:0 auto 20px;"></div>
            <h1>تطبيق مدينة منعة</h1>
            <button class="btn" onclick="loginWithGoogle()">تسجيل الدخول بـ Google</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <div class="card">
            <h2>مرحباً بك في المنصة</h2>
            <button id="admin-btn" class="btn" style="background:#ffcc00; display:none;" onclick="showPage('admin-page')">⚙️ لوحة تحكم المدير</button>
        </div>
    </div>

    <div id="admin-page" class="page">
        <button class="back-btn" onclick="showPage('main-page')">← عودة</button>
        <div class="card">
            <h2>لوحة الإدارة</h2>
            <p>إدارة الحافلات، الخدمات، والمستخدمين.</p>
        </div>
    </div>

</body>
</html>
