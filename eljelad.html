<div id="auth-container">
    <h2 id="status-title">تسجيل دخول المنظومة</h2>
    <input type="email" id="email" placeholder="أدخل البريد الإلكتروني (الجندي)">
    <button onclick="sendOTP()" id="send-btn">إرسال رمز التحقق</button>
    
    <div id="otp-section" style="display:none;">
        <input type="text" id="otp-code" placeholder="أدخل الرمز المكون من 6 أرقام">
        <button onclick="verifyOTP()">تأكيد العملية</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

  // إعدادات Firebase الخاصة بك التي أرسلتها
  const firebaseConfig = {
    apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
    authDomain: "elje-b6343.firebaseapp.com",
    databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
    projectId: "elje-b6343",
    storageBucket: "elje-b6343.firebasestorage.app",
    messagingSenderId: "295465762171",
    appId: "1:295465762171:web:6af4eea3818558fd0191de",
    measurementId: "G-T7YCSLDDZF"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // وظيفة إرسال الرمز للجنود
  window.sendOTP = function() {
    const email = document.getElementById('email').value;
    
    // منع استخدام إيميل هاني دوحة وتخصيص الماركا الماريكان كقائد
    if (email === "hanidouha595@gmail.com") {
        alert("هذا الحساب لم يعد معتمداً كقائد. يرجى استخدام حساب الماركا الماريكان.");
        return;
    }

    const actionCodeSettings = {
      url: window.location.href, // سيعود المستخدم لنفس الصفحة
      handleCodeInApp: true,
    };

    sendSignInLinkToEmail(auth, email, actionCodeSettings)
      .then(() => {
        window.localStorage.setItem('emailForSignIn', email);
        alert("تم إرسال رابط التحقق إلى إيميل الجندي. يرجى التحقق من البريد.");
        document.getElementById('otp-section').style.display = 'block';
      })
      .catch((error) => {
        console.error("خطأ:", error.message);
      });
  }

  // وظيفة التأكيد عند الضغط على الرابط/الرمز
  window.onload = function() {
    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) {
        email = window.prompt('يرجى إدخال إيميلك للتأكيد:');
      }
      signInWithEmailLink(auth, email, window.location.href)
        .then((result) => {
          window.localStorage.removeItem('emailForSignIn');
          alert("تم تسجيل الدخول بنجاح! القائد: الماركا الماريكان");
          // هنا يفتح الموقع للترسانة الحربية
          window.location.href = "main_dashboard.html"; 
        })
        .catch((error) => {
          alert("حدث خطأ في التحقق.");
        });
    }
  }
</script>
