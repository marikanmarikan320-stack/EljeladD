<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة الجلاد الجزائري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glow-color: #00ff00; /* لون الهكر الأساسي */
        }
        
        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حواف الهاتف المضيئة */
        .phone-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #111;
            box-shadow: inset 0 0 20px #00ff00, 0 0 20px #00ff00;
            z-index: 10;
            pointer-events: none;
            animation: borderGlow 2s infinite alternate;
        }

        @keyframes borderGlow {
            from { box-shadow: inset 0 0 15px #d52b1e, 0 0 15px #d52b1e; }
            to { box-shadow: inset 0 0 25px #006233, 0 0 25px #006233; }
        }

        /* النص المتوهج بألوان علم الجزائر */
        .glitch-text {
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            animation: flagColors 3s infinite;
        }

        @keyframes flagColors {
            0%, 33% { color: #006233; text-shadow: 0 0 10px #006233; } /* أخضر */
            34%, 66% { color: #ffffff; text-shadow: 0 0 10px #ffffff; } /* أبيض */
            67%, 100% { color: #d52b1e; text-shadow: 0 0 10px #d52b1e; } /* أحمر */
        }

        /* الشعار الدائري المتوهج */
        .main-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 30px #fff;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #222, #000);
            animation: pulseLogo 1.5s infinite;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); box-shadow: 0 0 20px #00ff00; }
            50% { transform: scale(1.05); box-shadow: 0 0 40px #d52b1e; }
            100% { transform: scale(1); box-shadow: 0 0 20px #00ff00; }
        }

        /* زر الدخول */
        .btn-login {
            background: linear-gradient(45deg, #006233, #d52b1e);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-login:active {
            transform: scale(0.9);
            box-shadow: 0 0 25px #fff;
        }
    </style>
</head>
<body>

    <div class="phone-border"></div>

    <div class="z-20 flex flex-col items-center">
        <h1 class="glitch-text mb-4">
            منظومة جيش التبليغ الجزائري<br>
            <span class="text-sm">بقيادة الجلاد الجزائري</span>
        </h1>

        <div class="main-logo">
            <span class="text-xs text-gray-400">LOGO DZ</span>
        </div>

        <p class="text-gray-400 mb-8 text-center text-xs px-10">نحارب من أجل تنظيف المجتمع</p>

        <button onclick="startLogin()" class="btn-login">
            تسجيل الدخول
        </button>
    </div>

    <script>
        function startLogin() {
            // سيتم ربط Firebase Google Auth هنا في المرحلة القادمة
            alert("جارٍ الانتقال لنظام التحقق من الهوية...");
        }
    </script>
</body>
</html>
