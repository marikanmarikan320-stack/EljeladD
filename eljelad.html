<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة</title>
    <style>
        /* الخلفية التكنولوجية */
        body {
            margin: 0; padding: 0; height: 100vh;
            background: #050505; color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }

        /* حاوية البطاقة الاحترافية (Glassmorphism Card) */
        .tech-card {
            width: 90%; max-width: 400px;
            padding: 30px; border-radius: 45px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* الشعار الدائري المضيء */
        .logo-circle {
            width: 140px; height: 140px; border-radius: 50%;
            margin: 0 auto 20px;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.5); /* إضاءة ناعمة */
        }

        h1 { font-size: 20px; font-weight: 600; margin-bottom: 15px; color: #fff; }
        p { font-size: 15px; color: #b3b3b3; line-height: 1.6; margin-bottom: 30px; }

        /* الزر الاحترافي (Call to Action) */
        .cta-btn {
            width: 100%; padding: 18px; border-radius: 20px;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white; border: none; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }
        .cta-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="tech-card">
    <div class="logo-circle"></div>
    <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
    <p>منصة رقمية متكاملة تضع بين يديك دليل الخدمات، الأخبار العاجلة، والأرقام الضرورية. نخدم بلدتنا بتكنولوجيا حديثة وتصميم يليق بأهالينا.</p>
    <button class="cta-btn">تسجيل الدخول</button>
</div>

</body>
</html>
