<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق منعة الرقمي</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('user-dashboard').style.display = 'block';
                // تفعيل زر الأدمن إذا كان الإيميل مطابق
                if (user.email === "marikanmarikan320@gmail.com") {
                    document.getElementById('admin-btn').style.display = 'block';
                }
            }
        });

        window.toggleAdmin = () => {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };
    </script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg { position: fixed; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000') center/cover; filter: brightness(0.2); z-index: -1; }
        .card { width: 85%; max-width: 350px; margin: 100px auto; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 40px; text-align: center; }
        .logo { width: 120px; height: 120px; border-radius: 50%; background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover; margin: 0 auto 20px; border: 3px solid #fff; }
        #admin-btn { display: none; margin-top: 20px; background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        #admin-panel { display: none; margin-top: 20px; padding: 20px; background: #00d4ff; color: #000; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div id="login-page">
        <div class="card">
            <div class="logo"></div>
            <h1>تطبيق مدينة منعة</h1>
            <button onclick="loginWithGoogle()" style="padding:15px; border-radius:20px; border:none; width:100%; cursor:pointer;">الدخول بواسطة Google</button>
        </div>
    </div>

    <div id="user-dashboard" style="display:none;">
        <div class="card">
            <h2>مرحباً بك في التطبيق</h2>
            <button id="admin-btn" onclick="toggleAdmin()">⚙️ فتح لوحة التحكم</button>
            <div id="admin-panel">
                <h3>لوحة الإدارة</h3>
                <p>إضافة أقسام، حذف منشورات، إدارة البيانات..</p>
            </div>
        </div>
    </div>
</body>
</html>
