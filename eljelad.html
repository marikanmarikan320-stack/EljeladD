<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مدينة منعة - ولاية باتنة</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 1. تسجيل الدخول
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) { alert("خطأ: " + error.message); }
        };

        // 2. مراقبة حالة الدخول وإظهار لوحة المدير
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-name').innerText = "مرحباً: " + user.displayName;
                
                // هنا الشرط الخاص بك كمدير
                if (user.email === "marikanmarikan320@gmail.com") {
                    document.getElementById('admin-panel').style.display = 'block';
                }
            }
        });
    </script>

    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .app-bg { position: fixed; top:0; left:0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000') center/cover; filter: brightness(0.2); z-index: -1; }
        .card { width: 85%; max-width: 350px; margin: 50px auto; padding: 30px; background: rgba(255,255,255,0.1); border-radius: 30px; backdrop-filter: blur(10px); }
        #admin-panel { display: none; margin-top: 20px; padding: 20px; background: #004a99; border-radius: 20px; }
        .btn { padding: 15px 30px; background: #fff; color: #000; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-bg"></div>

    <div id="login-box" class="card">
        <h1>تطبيق مدينة منعة</h1>
        <button class="btn" onclick="loginWithGoogle()">تسجيل الدخول بواسطة Google</button>
    </div>

    <div id="user-profile" class="card" style="display:none;">
        <h2 id="user-name"></h2>
        <div id="admin-panel">
            <h3 style="color:#00d4ff;">⚙️ لوحة تحكم المدير</h3>
            <p>يمكنك الآن إضافة القوائم من هنا...</p>
            <button class="btn" style="background:#28a745; color:white;">إضافة قائمة حافلات</button>
        </div>
    </div>
</body>
</html>
