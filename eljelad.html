<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v25.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --samsung-blue: #0355d0; --algeria-green: #006233; --algeria-red: #d21034;
            --cyber-green: #00ff41; --glass: rgba(10, 10, 10, 0.98);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* تأثير إضاءة الحواف الأحمر (حالة الحرب) */
        .edge-glow { position: fixed; inset: 0; pointer-events: none; z-index: 10000; box-shadow: inset 0 0 25px var(--algeria-red); animation: threat-pulse 2s infinite; }
        @keyframes threat-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

        /* نظام الواجهات المنفصلة */
        .view { display: none; width: 100%; height: 100%; position: absolute; inset: 0; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; background: #000; }
        .active-view { display: flex !important; }

        /* الهوية البصرية */
        .logo-main { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--cyber-green); box-shadow: 0 0 30px var(--cyber-green); margin-bottom: 25px; background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; }
        
        .btn-ui { width: 100%; max-width: 320px; padding: 18px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 15px; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-strike { background: var(--algeria-red); color: white; box-shadow: 0 0 15px var(--algeria-red); }

        /* الأهداف (تصميم One UI) */
        .target-card { 
            width: 100%; max-width: 400px; background: var(--glass); border: 1px solid var(--cyber-green);
            border-radius: 20px; padding: 18px; margin-bottom: 15px; text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); cursor: pointer;
        }

        /* لوحة التحكم */
        .admin-box { width: 100%; max-width: 400px; background: #0a0a0a; border: 2px solid var(--samsung-blue); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        .data-list { background: #111; padding: 10px; border-radius: 15px; max-height: 100px; overflow-y: auto; font-size: 0.8rem; margin: 10px 0; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }

        input { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; text-align: center; }

        /* واجهة الهكر (صفحة كاملة) */
        .hacker-banner { width: 100%; height: 230px; border-radius: 25px; background: url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') center/cover; margin-bottom: 25px; border: 2px solid var(--algeria-red); box-shadow: 0 0 25px var(--algeria-red); }
    </style>
</head>
<body>

<div class="edge-glow"></div>

<div id="view-login" class="view active-view" style="justify-content: center;">
    <div class="logo-main"></div>
    <h2 style="text-align: center; font-weight: 300;">منظومة الجلاد v25.0</h2>
    <p style="color: gray; margin-bottom: 30px;">اضغط للتحقق من الرتبة العسكرية</p>
    <button class="btn-ui btn-google" onclick="login()">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        الدخول عبر Google 🔐
    </button>
</div>

<div id="view-main" class="view">
    <div class="logo-main" style="width: 80px; height: 80px;"></div>
    
    <div id="commander-ui" style="display: none; width: 100%; max-width: 400px;">
        <div class="admin-box">
            <h4 style="color: var(--samsung-blue); margin: 0;">📊 الرقابة والتحكم</h4>
            <div id="users-log" class="data-list"></div>
            <h4 style="margin: 10px 0;">🎖️ إدارة المشرفين</h4>
            <div id="mods-log" class="data-list"></div>
            <input type="email" id="mod-email" placeholder="جيميل المشرف الجديد...">
            <button class="btn-ui btn-blue" onclick="addMod()" style="padding: 10px; font-size: 0.9rem; background: var(--samsung-blue); color:white;">إضافة مشرف 🎖️</button>
        </div>
        
        <div class="admin-box" style="border-color: var(--algeria-red);">
            <input type="text" id="target-input" placeholder="رابط الهدف الجديد...">
            <button class="btn-ui btn-strike" onclick="pushTarget()" style="padding: 12px;">تعميم الإحداثيات 🚀</button>
        </div>
    </div>

    <h3 style="color: gray; font-weight: 400;">رادار الأهداف النشطة</h3>
    <div id="targets-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="view-strike" class="view">
    <div class="hacker-banner"></div>
    <h2 style="color: var(--algeria-red); margin: 0;">تعليمات القيادة العليا</h2>
    
    <div style="background: rgba(0,255,65,0.05); border-right: 4px solid var(--algeria-green); padding: 15px; border-radius: 15px; margin: 20px 0; font-size: 0.85rem; text-align: left; direction: ltr;">
        ⚠️ <b>Order:</b> Strike without mercy. Use the automated English report. The target link is injected. Copy the text and blast the support!
    </div>

    <button class="btn-ui btn-strike" onclick="launchTikTok()">📍 اقتحام تيك توك</button>
    <button class="btn-ui" style="background: white; color: black;" onclick="launchGmail()">📧 قصف إيميل (English)</button>
    <button class="btn-ui" style="background: var(--samsung-blue); color:white;" onclick="window.location.href='https://www.tiktok.com/legal/report/feedback'">📜 استمارة جوجل</button>
    <button class="btn-ui" onclick="showView('view-main')" style="background: none; color: gray;">تراجع للرادار ✕</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com";
    let activeTarget = "";

    // إدارة التنقل بين الواجهات
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(viewId).classList.add('active-view');
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).set({ email: user.email, ts: Date.now() });
            showView('view-main');
            
            if(user.email === MASTER) {
                document.getElementById('commander-ui').style.display = 'block';
                loadAdminTools();
            }
            loadTargets();
        }
    });

    function login() {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            return auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });
    }

    // أدوات القائد
    function loadAdminTools() {
        db.ref('users').on('value', s => {
            let h = "";
            s.forEach(u => h += `<div>🟢 ${u.val().email}</div>`);
            document.getElementById('users-log').innerHTML = h;
        });
        db.ref('mods').on('value', s => {
            let h = "";
            s.forEach(m => h += `<div class="item-row"><span>🎖️ ${m.val()}</span><span style="color:red" onclick="removeMod('${m.key}')">حذف</span></div>`);
            document.getElementById('mods-log').innerHTML = h;
        });
    }

    function addMod() {
        const e = document.getElementById('mod-email').value;
        if(e) { db.ref('mods').push(e); document.getElementById('mod-email').value = ""; }
    }
    function removeMod(k) { db.ref('mods').child(k).remove(); }

    function pushTarget() {
        const u = document.getElementById('target-input').value;
        if(u.includes('http')) { db.ref('targets').push({ url: u, ts: Date.now() }); document.getElementById('target-input').value = ""; }
    }

    // عرض الأهداف
    function loadTargets() {
        db.ref('targets').limitToLast(15).on('value', s => {
            const list = document.getElementById('targets-list');
            list.innerHTML = "";
            s.forEach(t => {
                const b = document.createElement('div');
                b.className = 'target-card';
                b.innerHTML = `⚔️ <b>بدء الاقتحام</b><br><small style="color:gray">${t.val().url.substring(0,35)}...</small>`;
                b.onclick = () => {
                    activeTarget = t.val().url;
                    showView('view-strike');
                };
                list.prepend(b);
            });
        });
    }

    // وظائف التنفيذ
    function launchTikTok() {
        window.location.href = activeTarget.replace("https://www.tiktok.com/", "snssdk1128://");
        setTimeout(() => { window.location.href = activeTarget; }, 1000);
    }

    function launchGmail() {
        const emails = "feedback@tiktok.com,legal@tiktok.com,communitymanager@tiktok.com,privacy@tiktok.com,reports@tiktok.com";
        const msg = `Dear Safety Team,\n\nI am reporting this account for serious violations: ${activeTarget}.\n\nThis user promotes content that violates international safety standards. We demand an immediate manual review and permanent ban. Our community is monitoring this case.\n\nTarget: ${activeTarget}\nID: DZ-ELJELAD-OPS`;
        
        navigator.clipboard.writeText(msg).then(() => {
            alert("تم نسخ البلاغ الإنجليزي! سيفتح Gmail الآن.");
            window.location.href = `mailto:${emails}?subject=Report Violation&body=${encodeURIComponent(msg)}`;
        });
    }
</script>
</body>
</html>
