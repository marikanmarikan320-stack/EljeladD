<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة الجلاد الجزائري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .glow-border { box-shadow: 0 0 15px #006233, inset 0 0 15px #d52b1e; }
        .samsung-btn { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .samsung-btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.15); }
        .flag-text { animation: flagColors 3s infinite; }
        @keyframes flagColors {
            0%, 33% { color: #006233; }
            34%, 66% { color: #ffffff; }
            67%, 100% { color: #d52b1e; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-section" class="text-center w-full max-w-sm">
        <div class="w-32 h-32 mx-auto mb-6 rounded-full border-2 border-white/20 shadow-[0_0_30px_#00ff00] animate-pulse" 
             style="background: url('https://i.postimg.cc/1VVx8Y5k/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;"></div>
        <h1 class="flag-text text-2xl font-bold mb-2">منظومة الجلاد الجزائري</h1>
        <p class="text-gray-500 text-sm mb-8">نظام التبليغ المركزي - القيادة العامة</p>
        <button onclick="handleAuth()" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition">
            دخول سريع عبر Google
        </button>
    </div>

    <div id="admin-section" class="hidden w-full max-w-md">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-red-500 font-bold">لوحة القائد الأعلى</h2>
            <span class="text-xs bg-red-600/20 text-red-500 px-3 py-1 rounded-full border border-red-600">نشط الآن</span>
        </div>
        <div class="bg-gray-900/50 p-6 rounded-3xl border border-white/10 mb-6">
            <input type="text" id="target-url" placeholder="ضع رابط الهدف هنا..." class="w-full bg-black border border-white/10 p-4 rounded-2xl mb-4 focus:border-red-600 outline-none">
            <button onclick="sendTarget()" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-600/20">إرسال للجنود فوراً</button>
        </div>
        <h3 class="text-sm text-gray-500 mb-4">الأهداف النشطة حالياً:</h3>
        <div id="admin-targets-list" class="space-y-3"></div>
    </div>

    <div id="soldier-section" class="hidden w-full max-w-md text-center">
        <div class="mb-8">
            <div class="w-16 h-16 mx-auto mb-2 rounded-full border border-green-600" style="background: url('https://i.postimg.cc/1VVx8Y5k/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;"></div>
            <p class="text-green-500 text-sm font-bold">تم التحقق: الجندي نشط</p>
        </div>
        <h2 class="text-2xl font-bold mb-6">الترسانة الحربية</h2>
        <div id="soldier-targets-list" class="space-y-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
            authDomain: "elje-b6343.firebaseapp.com",
            projectId: "elje-b6343",
            storageBucket: "elje-b6343.firebasestorage.app",
            messagingSenderId: "295465762171",
            appId: "1:295465762171:web:6af4eea3818558fd0191de"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const ADMIN_EMAIL = "hanidouha595@gmail.com";

        // وظيفة الدخول
        window.handleAuth = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert("خطأ في الاتصال"); }
        };

        // تتبع حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-section').classList.remove('hidden');
                } else {
                    document.getElementById('soldier-section').classList.remove('hidden');
                }
            }
        });

        // القائد: إرسال هدف
        window.sendTarget = async () => {
            const url = document.getElementById('target-url').value;
            if (url) {
                await addDoc(collection(db, "targets"), { url, time: Date.now() });
                document.getElementById('target-url').value = "";
            }
        };

        // تحديث القائمة للجميع
        onSnapshot(query(collection(db, "targets"), orderBy("time", "desc")), (snap) => {
            const adminList = document.getElementById('admin-targets-list');
            const soldierList = document.getElementById('soldier-targets-list');
            adminList.innerHTML = ""; soldierList.innerHTML = "";

            snap.forEach((d) => {
                const data = d.data();
                const id = d.id;
                
                // زر الجندي (تصميم ناعم)
                soldierList.innerHTML += `
                    <button onclick="window.open('${data.url}')" class="w-full samsung-btn p-5 flex items-center justify-between">
                        <span class="font-medium text-white/90">بث مسيء جديد - اضغط للتبليغ</span>
                        <div class="bg-red-600 h-2 w-2 rounded-full animate-ping"></div>
                    </button>`;

                // زر القائد (مع خيار الحذف)
                adminList.innerHTML += `
                    <div class="flex gap-2">
                        <button class="flex-1 bg-white/5 p-3 rounded-xl text-left text-xs truncate">${data.url}</button>
                        <button onclick="deleteTarget('${id}')" class="bg-red-600/20 text-red-500 px-4 rounded-xl font-bold">حذف</button>
                    </div>`;
            });
        });

        window.deleteTarget = async (id) => { await deleteDoc(doc(db, "targets", id)); };
    </script>
</body>
</html>
