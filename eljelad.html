<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تطبيق منظومة الجلاد v18.5 - المولد المصلح</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root { 
            --samsung-primary: #0355d0; --war-red: #ff3b30; --cyber-green: #00ff41;
            --gold: #ffcc00; --bg: #000000; --card-bg: rgba(10, 10, 10, 0.98);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; } 

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* شاشة فيديو الهاكر الجزائري */
        #hacker-war-video {
            position: fixed; inset: 0; background: #000; z-index: 999999;
            display: none; align-items: center; justify-content: center;
        }
        #hacker-war-video video { width: 100%; height: 100%; object-fit: cover; filter: hue-rotate(90deg); }

        /* تأثير الدخان الأخضر والاهتزاز */
        #hacker-smoke {
            position: fixed; inset: 0; background: rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(15px); z-index: 200000; display: none;
            pointer-events: none; border: 10px solid var(--cyber-green);
        }
        
        .shake-heavy { animation: extreme-shake 0.1s infinite; }
        @keyframes extreme-shake {
            0% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        .edge-lighting {
            position: fixed; inset: 0; pointer-events: none; z-index: 10000;
            box-shadow: inset 0 0 20px var(--cyber-green);
            animation: pulse-edge 2s infinite;
        }
        @keyframes pulse-edge {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .app-container {
            width: 100%; height: 100%;
            background: url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') no-repeat center/cover;
            position: relative; transition: filter 0.5s ease;
        }

        #splash-screen {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .circular-logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--cyber-green);
            background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;
            margin: 0 auto 15px;
            box-shadow: 0 0 15px var(--cyber-green);
            animation: logo-glow 1.5s infinite ease-in-out;
        }

        #digital-clock {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: var(--cyber-green); font-size: 3.5rem; font-weight: bold;
            text-shadow: 0 0 20px var(--cyber-green); z-index: 10;
        }

        .radar-box {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 50%; z-index: 5; pointer-events: none;
        }
        .radar-sweep {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 65, 0.2));
            animation: sweep 4s linear infinite;
        }
        @keyframes sweep { to { transform: rotate(360deg); } }

        .bottom-dock {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; padding: 0 10px; z-index: 100;
        }
        .app-icon { width: 75px; text-align: center; cursor: pointer; }
        .icon-shape {
            width: 65px; height: 65px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin-bottom: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 85vh;
            background: var(--card-bg); 
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg');
            background-size: cover; background-position: center;
            backdrop-filter: blur(20px);
            border-radius: 40px 40px 0 0; z-index: 1000;
            padding: 30px 25px; transition: 0.5s cubic-bezier(0, 0, 0.2, 1);
            border-top: 2px solid var(--cyber-green);
        }
        .modal-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #444; border-radius: 10px; margin: -10px auto 20px; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }
        textarea {
            width: 100%; height: 160px; background: #000;
            color: var(--cyber-green); border: 1px solid var(--cyber-green);
            border-radius: 20px; padding: 15px; font-family: monospace; font-size: 12px;
        }

        #matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.1; }
    </style>
</head>
<body>

<div id="hacker-war-video">
    <video id="vid-player" playsinline muted>
        <source src="https://v1.nitrocdn.com/fMvCqyXyIqPzTqZlXzLzYvG/assets/static/optimized/rev-5e43c16/wp-content/uploads/2022/11/Hacker-Intro.mp4" type="video/mp4">
    </video>
</div>
<div id="hacker-smoke"></div>
<div class="edge-lighting"></div>

<div id="splash-screen">
    <div style="width:180px; height:180px; border-radius:50%; border:3px solid var(--cyber-green); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover; box-shadow: 0 0 40px var(--cyber-green);"></div>
    <h2 id="status-text" style="margin-top:30px; color: var(--cyber-green);">جاري استرجاع المولد النووي...</h2>
    <button id="entry-btn" style="display:none; background:var(--cyber-green); color:black; padding:15px 40px; border-radius:50px; font-weight:bold; border:none;" onclick="launchApp()">دخول النظام ⚔️</button>
</div>

<div class="app-container" id="main-app">
    <div id="digital-clock">00:00:00</div>
    <div class="radar-box"><div class="radar-sweep"></div></div>
    <canvas id="matrix-bg"></canvas>

    <div class="bottom-dock">
        <div class="app-icon" onclick="vibe(); openSheet('s1')">
            <div class="icon-shape" style="background: linear-gradient(135deg, #0a74da, #0355d0);">🛡️</div>
            <div class="app-name">البوابة</div>
        </div>
        <div class="app-icon" onclick="vibe(); launchSearchRadar()">
            <div class="icon-shape" style="background: linear-gradient(135deg, #00ff41, #008f11);">🔍</div>
            <div class="app-name">الرادار</div>
        </div>
        <div class="app-icon" onclick="vibe(); openSheet('s2')">
            <div class="icon-shape" style="background: linear-gradient(135deg, #ff5e57, #ff3b30);">🎯</div>
            <div class="app-name">اقتحام</div>
        </div>
        <div class="app-icon" onclick="vibe(); openSheet('s3')">
            <div class="icon-shape" style="background: linear-gradient(135deg, #ffcc00, #ff9500);">☣️</div>
            <div class="app-name">المولد</div>
        </div>
    </div>
</div>

<div class="modal-sheet" id="s1">
    <div class="sheet-handle"></div>
    <button class="btn-action" style="background: var(--samsung-primary); color: white;" onclick="warAction('https://www.tiktok.com/legal/report/feedback')">إطلاق القذيفة</button>
    <button onclick="vibe(); closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s2">
    <div class="sheet-handle"></div>
    <button class="btn-action" style="background: var(--war-red); color: white;" onclick="launchNativeTikTok()">بدء الاقتحام</button>
    <button onclick="vibe(); closeSheet()" style="width:100%; background:none; border:none; color:grey;">إلغاء</button>
</div>

<div class="modal-sheet" id="s3">
    <div class="sheet-handle"></div>
    <textarea id="mail-text" readonly placeholder="الشفرة النووية ستولد هنا..."></textarea>
    <button class="btn-action" style="background: var(--gold); color: black;" onclick="vibe(); generateMassiveReport()">🔄 توليد ونسخ شفرة (600 حرف)</button>
    <button class="btn-action" style="background: white; color: black;" onclick="sendFinalEmail()">🚀 قصف الجيميلات</button>
    <button onclick="vibe(); closeSheet()" style="width:100%; background:none; border:none; color:grey;">رجوع</button>
</div>

<script>
    // نظام الصوت بـ Howler لضمان العمل على الهواتف
    const bgMusic = new Howl({ src: ['https://archive.org/download/boyka-music-remix/boyka.mp3'], loop: true, volume: 0.5 });
    const gunSound = new Howl({ src: ['https://www.soundjay.com/mechanical/gun-shot-01.mp3'], volume: 1.0 });
    const clickSnd = new Howl({ src: ['https://www.soundjay.com/mechanical/mechanical-clunk-1.mp3'] });
    const reloadSnd = new Howl({ src: ['https://www.soundjay.com/mechanical/gun-cocking-01.mp3'] });

    const tiktokAdmins = ["legal@tiktok.com", "feedback@tiktok.com", "communitymanager.mena@tiktok.com", "privacy@tiktok.com", "info@tiktok.com"];
    let finalTarget = "https://www.tiktok.com/@ELJELAD_DZ";

    function vibe(ms = 60) { if(navigator.vibrate) navigator.vibrate(ms); clickSnd.play(); }

    function warAction(url) {
        gunSound.play();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 1500, 500, 1000]);
        document.getElementById('hacker-war-video').style.display = 'flex';
        document.getElementById('vid-player').play();
        document.getElementById('hacker-smoke').style.display = 'block';
        document.body.classList.add('shake-heavy');
        
        setTimeout(() => {
            window.location.href = url;
        }, 3500);
    }

    function launchApp() {
        vibe(100); bgMusic.play();
        const urlParams = new URLSearchParams(window.location.search);
        let captured = urlParams.get('target') || urlParams.get('url');
        if (captured) finalTarget = captured;
        document.getElementById('splash-screen').style.display = 'none';
        initMatrix(); updateClock();
    }

    function launchSearchRadar() {
        warAction(`https://www.tiktok.com/search?q=ELJELAD_DZ`);
    }

    function launchNativeTikTok() {
        const cleanURL = finalTarget.replace('https://', '').replace('http://', '');
        warAction(`intent://${cleanURL}#Intent;package=com.zhiliaoapp.musically;scheme=https;end`);
    }

    function generateMassiveReport() {
        reloadSnd.play();
        const intro = ["URGENT: Community Safety Violation Report.", "OFFICIAL NOTICE: Illegal Activity Detected on Platform."];
        const core = [`The account identified as (${finalTarget}) is actively participating in organized criminal promotion.`];
        const technical = [" Our cyber-intelligence indicates the use of emulators and automated scripts."];
        const closing = " We demand an immediate permanent ban. Report_Token: " + Math.random().toString(36).substring(2, 12).toUpperCase();
        let fullReport = intro[0] + "\n\n" + core[0] + "\n\n" + technical[0] + "\n\n" + closing;
        while(fullReport.length < 600) { fullReport += " Reporting under Digital Safety Act Section 105. "; }
        document.getElementById('mail-text').value = fullReport;
        navigator.clipboard.writeText(fullReport);
    }

    function sendFinalEmail() {
        const body = encodeURIComponent(document.getElementById('mail-text').value);
        warAction(`mailto:${tiktokAdmins.join(',')}?subject=URGENT_REPORT&body=${body}`);
    }

    function updateClock() {
        document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB');
        setTimeout(updateClock, 1000);
    }

    function openSheet(id) { document.getElementById(id).classList.add('active'); document.getElementById('main-app').style.filter = 'blur(15px)'; if(id === 's3') generateMassiveReport(); }
    function closeSheet() { document.querySelectorAll('.modal-sheet').forEach(s => s.classList.remove('active')); document.getElementById('main-app').style.filter = 'none'; }

    function initMatrix() {
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 15)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    }

    setTimeout(() => { document.getElementById('entry-btn').style.display = 'block'; }, 2000);
</script>
</body>
</html>
