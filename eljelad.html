<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام منعة التقني</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02050A; font-family: 'Segoe UI', Arial, sans-serif; }

        /* الخلفية التكنولوجية الفائقة */
        .tech-bg {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #02050A, #0B132B);
            background-image: radial-gradient(circle at top right, #1B263B, transparent), 
                              radial-gradient(circle at bottom left, #0F3460, transparent);
            z-index: -1;
        }

        .main-container {
            height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center; color: white;
        }

        /* الشعار والوهج */
        .logo-box {
            width: 150px; height: 150px; border-radius: 40px;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(74, 157, 246, 0.4);
            margin-bottom: 25px;
        }

        h1 { font-size: 24px; margin-bottom: 15px; letter-spacing: 1px; }

        .desc-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 30px; margin-bottom: 30px; max-width: 350px;
        }

        .cta-button {
            width: 100%; max-width: 300px; padding: 18px; border-radius: 50px;
            background: #4A90E2; color: white; border: none; font-size: 17px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
        }
        .cta-button:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="tech-bg"></div>

    <div class="main-container">
        <div class="logo-box"></div>
        <h1>تطبيق صفحة مدينة منعة</h1>
        
        <div class="desc-box">
            <p>بوابتكم الرقمية الرسمية. تم تطوير هذا التطبيق باستخدام تقنيات متقدمة لضمان استقرار الخدمات وسرعة الوصول للأخبار والبيانات المحلية لجميع أهالي بلدتنا.</p>
        </div>

        <button class="cta-button" onclick="alert('تفعيل نظام الدخول...')">تسجيل الدخول</button>
    </div>

</body>
</html>
