<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة - ولاية باتنة</title>
    <style>
        /* التنسيق العام */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* 1. واجهة الترحيب (تظهر أولاً) */
        #splash-screen {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s ease;
        }

        .splash-logo {
            width: 180px; height: 180px; border-radius: 50%;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            border: 4px solid #fff; box-shadow: 0 0 40px #00d4ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } 50% { transform: scale(1.05); box-shadow: 0 0 50px #00d4ff; } 100% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } }

        .splash-text { text-align: center; color: white; margin-top: 30px; padding: 0 20px; }
        .splash-text h1 { font-size: 24px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .splash-text p { font-size: 16px; line-height: 1.8; color: #ccc; }

        /* 2. واجهة الدخول (مخفية في البداية) */
        #login-page {
            width: 100%; height: 100%; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        .app-bg {
            position: absolute; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000') center/cover;
            filter: brightness(0.25); z-index: -1;
        }

        .login-card { width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .small-logo { width: 100px; height: 100px; border-radius: 25px; background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2); }
        h2 { color: white; font-size: 18px; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 16px; border-radius: 14px; background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .google-login { margin-top: 20px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 14px; }
        .google-icon { width: 20px; height: 20px; background: url('https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg') center/contain; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo"></div>
        <div class="splash-text">
            <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
            <p>يرحب بكل المتابعين الكرام.. نضع التكنولوجيا في خدمة أهلنا عبر هذه المنصة الرقمية لتكون جسراً يربطكم بكل خدمات بلدتنا وأخبارها العاجلة.</p>
        </div>
    </div>

    <div id="login-page">
        <div class="app-bg"></div>
        <div class="login-card">
            <div class="small-logo"></div>
            <h2>تطبيق صفحة مدينة منعة</h2>
            <input type="email" placeholder="البريد الإلكتروني">
            <input type="password" placeholder="كلمة المرور">
            <button class="btn-login">تسجيل الدخول</button>
            <div class="google-login" onclick="alert('جارٍ تهيئة تسجيل الدخول عبر Google...')">
                <div class="google-icon"></div>
                <span>الدخول بواسطة Google</span>
            </div>
        </div>
    </div>

    <script>
        // دالة الانتقال بعد 5 ثوانٍ
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            const login = document.getElementById('login-page');
            
            splash.style.opacity = '0'; // تأثير التلاشي
            setTimeout(() => {
                splash.style.display = 'none';
                login.style.display = 'flex';
            }, 1000); // وقت التلاشي
        }, 5000); // 5 ثوانٍ عرض واجهة الترحيب
    </script>

</body>
</html>
