<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مدينة منعة - ولاية باتنة</title>
    
    <style>
        /* التنسيق العام والخطوط */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; }

        /* 1. واجهة الترحيب (Splash Screen) */
        #splash-screen {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001f3f, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease;
        }

        .splash-logo {
            width: 160px; height: 160px; border-radius: 50%;
            background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover;
            border: 3px solid #fff; box-shadow: 0 0 30px #00d4ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        .splash-text { text-align: center; color: white; margin-top: 25px; padding: 0 30px; }
        .splash-text h1 { font-size: 22px; color: #ffcc00; margin-bottom: 10px; }

        /* 2. واجهة الدخول الاحترافية */
        #login-page {
            width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* الخلفية التكنولوجية بالموشن بلور */
        .tech-bg {
            position: absolute; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000') center/cover;
            filter: blur(10px) brightness(0.25); z-index: -1;
        }

        .login-card {
            width: 85%; max-width: 380px; padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white;
        }

        .small-logo { width: 100px; height: 100px; border-radius: 25px; background: url('https://i.postimg.cc/QV1Ynfq8/FB-IMG-1772200963086.jpg') center/cover; margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.2); }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; background: #007bff; color: white; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* زر جوجل الاحترافي */
        .google-btn {
            margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; background: rgba(255,255,255,0.07); border-radius: 12px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .google-btn:active { background: rgba(255,255,255,0.2); }
        .google-icon { width: 22px; height: 22px; background: url('https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg') center/contain; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات مشروعك التي أرسلتها
        const firebaseConfig = {
            apiKey: "AIzaSyB-sD-OVOlY9yk6vNja_vF83YzOFdZp6yQ",
            authDomain: "menaa-4ad54.firebaseapp.com",
            projectId: "menaa-4ad54",
            storageBucket: "menaa-4ad54.firebasestorage.app",
            messagingSenderId: "500170947175",
            appId: "1:500170947175:web:5779fce4590d4cd050f2c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // وظيفة تسجيل الدخول بجوجل
        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // حفظ بيانات المستخدم فوراً في مجموعة users التي أنشأتها
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    lastLogin: new Date()
                });

                alert("مرحباً بك يا " + user.displayName + " في تطبيق منعة!");
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };

        // التحكم في واجهة الترحيب (5 ثوانٍ)
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const login = document.getElementById('login-page');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    login.style.display = 'flex';
                }, 1500);
            }, 5000);
        };
    </script>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo"></div>
        <div class="splash-text">
            <h1>تطبيق صفحة مدينة منعة - ولاية باتنة</h1>
            <p>منصة رقمية متكاملة تخدم أهالي بلدتنا.. نضع التكنولوجيا في متناول يدكم لربط الخدمات بالأخبار بضغطة زر واحدة.</p>
        </div>
    </div>

    <div id="login-page">
        <div class="tech-bg"></div>
        <div class="login-card">
            <div class="small-logo"></div>
            <h2>تسجيل الدخول للمنظومة</h2>
            <input type="email" placeholder="البريد الإلكتروني">
            <input type="password" placeholder="كلمة المرور">
            <button class="btn-main">دخول</button>
            
            <div class="google-btn" onclick="loginWithGoogle()">
                <div class="google-icon"></div>
                <span>الدخول بواسطة Google</span>
            </div>
        </div>
    </div>

</body>
</html>
