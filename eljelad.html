<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v18.5 - نسخة الاقتحام</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root { 
            --cyber-green: #00ff41; --war-red: #ff3b30; --bg: #000;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; overflow: hidden; font-family: sans-serif; }

        /* شاشة الفيديو الحربي */
        #war-video-overlay {
            position: fixed; inset: 0; background: #000; z-index: 300000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .hacker-vid { width: 100%; height: 100%; object-fit: cover; border: 2px solid var(--cyber-green); }

        /* تأثير الدخان الأخضر */
        #green-smoke {
            position: fixed; inset: 0; background: rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(10px); z-index: 250000; display: none; pointer-events: none;
        }

        .shake-screen { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0,0); } }

        .app-container { width: 100%; height: 100%; background: url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') no-repeat center/cover; position: relative; }

        #splash-screen { position: fixed; inset: 0; z-index: 99999; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .bottom-dock { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; }
        .app-icon { width: 75px; text-align: center; cursor: pointer; }
        .icon-shape { width: 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .modal-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 80vh;
            background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--cyber-green);
            border-radius: 40px 40px 0 0; z-index: 1000; padding: 25px; transition: 0.5s;
        }
        .modal-sheet.active { bottom: 0; }
        
        .btn-action { width: 100%; padding: 18px; border-radius: 25px; border: none; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--cyber-green); border: 1px solid var(--cyber-green); border-radius: 15px; padding: 10px; font-size: 12px; }
        
        #matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.15; }
    </style>
</head>
<body>

<div id="war-video-overlay">
    <video id="hacker-video" class="hacker-vid" playsinline muted>
        <source src="https://v1.nitrocdn.com/fMvCqyXyIqPzTqZlXzLzYvG/assets/static/optimized/rev-5e43c16/wp-content/uploads/2022/11/Hacker-Intro.mp4" type="video/mp4">
    </video>
    <h2 style="position:absolute; bottom:20%; color:var(--cyber-green); text-shadow: 0 0 10px #000;">جاري سحق الهدف... 🇩🇿</h2>
</div>

<div id="green-smoke"></div>

<div id="splash-screen">
    <div style="width:150px; height:150px; border-radius:50%; border:3px solid var(--cyber-green); background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;"></div>
    <h2 style="color:var(--cyber-green); margin-top:20px;">نظام الجلاد v18.5</h2>
    <button id="entry-btn" style="display:none; background:var(--cyber-green); padding:15px 40px; border-radius:50px; font-weight:bold;" onclick="launchSystem()">دخول النظام ⚔️</button>
</div>

<div class="app-container" id="main-app">
    <canvas id="matrix-bg"></canvas>
    <div class="bottom-dock">
        <div class="app-icon" onclick="playClick(); openSheet('s1')"><div class="icon-shape" style="background: #0355d0;">🛡️</div></div>
        <div class="app-icon" onclick="playClick(); launchSearchRadar()"><div class="icon-shape" style="background: #008f11;">🔍</div></div>
        <div class="app-icon" onclick="playClick(); openSheet('s2')"><div class="icon-shape" style="background: #ff3b30;">🎯</div></div>
        <div class="app-icon" onclick="playClick(); openSheet('s3')"><div class="icon-shape" style="background: #ffcc00;">☣️</div></div>
    </div>
</div>

<div class="modal-sheet" id="s1">
    <button class="btn-action" style="background:#0355d0; color:white;" onclick="triggerWarAttack('https://www.tiktok.com/legal/report/feedback')">إرسال القذيفة القانونية</button>
    <button onclick="closeSheet()" style="width:100%; color:grey; background:none; border:none;">إغاء</button>
</div>

<div class="modal-sheet" id="s2">
    <button class="btn-action" style="background:#ff3b30; color:white;" onclick="triggerWarAttack('https://www.tiktok.com/@ELJELAD_DZ')">اقتحام الحساب مباشر</button>
    <button onclick="closeSheet()" style="width:100%; color:grey; background:none; border:none;">إلغاء</button>
</div>

<div class="modal-sheet" id="s3">
    <textarea id="mail-text" readonly></textarea>
    <button class="btn-action" style="background:#ffcc00;" onclick="generateMassiveReport()">🔄 توليد الشفرة (600 حرف)</button>
    <button class="btn-action" style="background:white;" onclick="triggerWarAttack('mailto:legal@tiktok.com')">🚀 قصف الجيميلات</button>
    <button onclick="closeSheet()" style="width:100%; color:grey; background:none; border:none;">رجوع</button>
</div>

<script>
    // نظام الصوت المطور
    const bgMusic = new Howl({ src: ['https://archive.org/download/boyka-music-remix/boyka.mp3'], loop: true, volume: 0.5 });
    const gunShot = new Howl({ src: ['https://www.soundjay.com/mechanical/gun-shot-01.mp3'], volume: 1.0 });
    const clickSnd = new Howl({ src: ['https://www.soundjay.com/mechanical/mechanical-clunk-1.mp3'] });
    const reloadSnd = new Howl({ src: ['https://www.soundjay.com/mechanical/gun-cocking-01.mp3'] });

    let finalTarget = "https://www.tiktok.com/@ELJELAD_DZ";

    function playClick() { clickSnd.play(); if(navigator.vibrate) navigator.vibrate(50); }

    function launchSystem() {
        bgMusic.play();
        document.getElementById('splash-screen').style.display = 'none';
        initMatrix();
    }

    function triggerWarAttack(url) {
        const videoOverlay = document.getElementById('war-video-overlay');
        const video = document.getElementById('hacker-video');
        
        videoOverlay.style.display = 'flex';
        document.getElementById('green-smoke').style.display = 'block';
        document.body.classList.add('shake-screen');
        
        video.play();
        gunShot.play(); // صوت الرصاص
        if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 1000, 500, 1000]);

        setTimeout(() => {
            document.body.classList.remove('shake-screen');
            window.location.href = url;
        }, 4000); // عرض الفيديو لمدة 4 ثواني قبل الانتقال
    }

    function openSheet(id) { document.getElementById(id).classList.add('active'); }
    function closeSheet() { document.querySelectorAll('.modal-sheet').forEach(s => s.classList.remove('active')); }

    function generateMassiveReport() {
        reloadSnd.play();
        let report = "URGENT REPORT: Account " + finalTarget + " is violating safety terms. ";
        while(report.length < 600) { report += "Immediate action required for organized harassment. "; }
        document.getElementById('mail-text').value = report;
        navigator.clipboard.writeText(report);
    }

    function launchSearchRadar() {
        const username = finalTarget.includes('@') ? finalTarget.split('@')[1].split('/')[0] : "ELJELAD_DZ";
        triggerWarAttack(`https://www.tiktok.com/search?q=${username}`);
    }

    function initMatrix() {
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 15)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    }

    setTimeout(() => { document.getElementById('entry-btn').style.display = 'block'; }, 2000);
</script>
</body>
</html>
