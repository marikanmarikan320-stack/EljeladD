<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منظومة الجلاد v26.1 - One UI Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --samsung-blue: #0355d0; 
            --algeria-green: #006233; 
            --algeria-red: #d21034;
            --cyber-green: #00ff41; 
            --bg-dark: #000000;
            --card-bg: #121212;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); color: white; 
            overflow: hidden; /* لمنع التمرير الخارجي المزعج */
        }

        /* توهج الحواف الحربي */
        .edge-glow { 
            position: fixed; inset: 0; pointer-events: none; z-index: 9999; 
            border: 2px solid var(--algeria-red); opacity: 0.3;
            box-shadow: inset 0 0 20px var(--algeria-red);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

        .view { 
            display: none; width: 100%; height: 100vh; 
            padding: 20px; flex-direction: column; align-items: center; 
            overflow-y: auto; position: relative;
        }
        .active-view { display: flex !important; }

        /* الهوية البصرية */
        .header-section { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .logo-main { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid var(--cyber-green); margin: 0 auto 15px;
            background: url('https://i.postimg.cc/vmdZn4vn/Screenshot-20260222-031125-Tik-Tok.jpg') center/cover;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }

        /* أزرار One UI */
        .btn-ui { 
            width: 100%; max-width: 340px; padding: 16px; border-radius: 28px; 
            border: none; font-weight: 600; cursor: pointer; font-size: 16px; 
            margin-bottom: 12px; transition: transform 0.1s;
        }
        .btn-ui:active { transform: scale(0.97); }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--samsung-blue); color: white; }
        .btn-danger { background: var(--algeria-red); color: white; }

        /* لوحة التحكم (Admin) */
        .admin-panel { 
            width: 100%; max-width: 400px; background: var(--card-bg); 
            border-radius: 30px; padding: 20px; border: 1px solid #333; margin-bottom: 20px;
        }
        .data-box { 
            background: #1a1a1a; border-radius: 18px; padding: 10px; 
            max-height: 150px; overflow-y: auto; margin: 10px 0; font-size: 13px;
        }
        .row-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; }

        /* رادار الأهداف */
        .target-grid { width: 100%; max-width: 450px; display: grid; gap: 15px; padding-bottom: 100px; }
        .target-card { 
            background: #111; border: 1px solid #333; border-radius: 24px; 
            padding: 20px; text-align: center; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .target-card:hover { border-color: var(--cyber-green); }

        /* واجهة الهجوم (Striker) */
        .modal-strike { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 90%; 
            background: #080808; z-index: 10001; transition: bottom 0.4s cubic-bezier(0, 0, 0.2, 1);
            border-radius: 35px 35px 0 0; border-top: 2px solid var(--algeria-red);
            padding: 25px; display: flex; flex-direction: column; align-items: center;
        }
        .modal-strike.active { bottom: 0; }
        .strike-banner { 
            width: 100%; height: 180px; border-radius: 25px; 
            background: url('https://i.postimg.cc/j2fHMWGY/unnamed-3.jpg') center/cover;
            margin-bottom: 20px; border: 1px solid var(--algeria-red);
        }

        input { 
            width: 100%; padding: 14px; border-radius: 20px; border: 1px solid #333; 
            background: #1a1a1a; color: white; margin-bottom: 10px; text-align: center; outline: none;
        }
        input:focus { border-color: var(--samsung-blue); }
    </style>
</head>
<body>

<div class="edge-glow"></div>

<div id="view-login" class="view active-view" style="justify-content: center;">
    <div class="header-section">
        <div class="logo-main"></div>
        <h1 style="font-size: 24px; letter-spacing: 1px;">منظومة الجلاد</h1>
        <p style="color: #888;">النسخة القتالية v26.1</p>
    </div>
    <button class="btn-ui btn-google" onclick="login()">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        الولوج الآمن عبر Google
    </button>
</div>

<div id="view-main" class="view">
    <div class="logo-main" style="width: 70px; height: 70px; margin-top: 10px;"></div>
    
    <div id="commander-ui" style="display: none; width: 100%; max-width: 400px;">
        <div class="admin-panel">
            <h4 style="margin: 0; color: var(--samsung-blue);">📊 الرقابة المركزية (<span id="user-count">0</span>)</h4>
            <div id="users-log" class="data-box"></div>
            
            <h4 style="margin: 15px 0 5px; color: #ffcc00;">🎖️ المشرفون</h4>
            <div id="mods-log" class="data-box"></div>
            
            <input type="email" id="mod-email" placeholder="بريد المشرف الجديد">
            <button class="btn-ui btn-primary" onclick="addMod()" style="padding: 10px; border-radius: 15px;">إضافة رتبة 🎖️</button>
        </div>

        <div class="admin-panel" style="border-color: var(--algeria-red);">
            <input type="text" id="target-input" placeholder="ضع رابط الهدف هنا...">
            <button class="btn-ui btn-danger" onclick="pushTarget()" style="border-radius: 18px;">تعميم الإحداثيات 🚀</button>
        </div>
    </div>

    <h3 style="color: #666; font-weight: 300; margin: 20px 0;">رادار العمليات الجارية</h3>
    <div id="targets-list" class="target-grid">
        </div>
</div>

<div class="modal-strike" id="strike-ui">
    <div style="width: 50px; height: 5px; background: #333; border-radius: 10px; margin-bottom: 20px;" onclick="closeStrike()"></div>
    <div class="strike-banner"></div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--algeria-red); margin: 0 0 10px;">تعليمات القيادة العليا</h2>
        <div style="background: rgba(0,255,65,0.05); padding: 15px; border-radius: 20px; font-size: 14px; line-height: 1.6; border: 1px dashed #333;">
            👊 <b>يا أسود الجزائر، اضربوا ولا تبالوا!</b><br>
            انسخوا البلاغ، توجهوا للهدف، وزلزلوا المنصة بالتقارير.
        </div>
    </div>

    <button class="btn-ui btn-danger" onclick="launchTikTok()">📍 اقتحام تيك توك</button>
    <button class="btn-ui btn-google" onclick="launchGmail()">📧 قصف إيميل (English)</button>
    <button class="btn-ui btn-primary" onclick="window.location.href='https://www.tiktok.com/legal/report/feedback'">📜 استمارة البلاغ الرسمي</button>
    <button class="btn-ui" onclick="closeStrike()" style="background: transparent; color: #666;">إغلاق الواجهة</button>
</div>

<script>
    // --- إعدادات Firebase (نفس التي قدمتها) ---
    const firebaseConfig = {
        apiKey: "AIzaSyB9Ezo3W4NsVxMtIoYlCxrto4xITfnXXig",
        authDomain: "elje-b6343.firebaseapp.com",
        databaseURL: "https://elje-b6343-default-rtdb.firebaseio.com",
        projectId: "elje-b6343",
        storageBucket: "elje-b6343.firebasestorage.app",
        messagingSenderId: "295465762171",
        appId: "1:295465762171:web:6af4eea3818558fd0191de"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const MASTER = "marikanmarikan320@gmail.com";
    let activeLink = "";

    // إدارة الدخول
    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).set({ email: user.email, ts: Date.now() });
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').classList.add('active-view');
            
            if(user.email === MASTER) {
                document.getElementById('commander-ui').style.display = 'block';
                loadAdminTools();
            }
            loadTargets();
        }
    });

    function login() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    // أدوات الإدارة
    function loadAdminTools() {
        db.ref('users').on('value', s => {
            document.getElementById('user-count').innerText = s.numChildren();
            let h = "";
            s.forEach(u => h += `<div class="row-item"><span>🟢 ${u.val().email}</span></div>`);
            document.getElementById('users-log').innerHTML = h;
        });
        db.ref('mods').on('value', s => {
            let h = "";
            s.forEach(m => h += `<div class="row-item"><span>🎖️ ${m.val()}</span><span style="color:red" onclick="removeMod('${m.key}')">حذف</span></div>`);
            document.getElementById('mods-log').innerHTML = h;
        });
    }

    function addMod() {
        const e = document.getElementById('mod-email').value;
        if(e) { db.ref('mods').push(e); document.getElementById('mod-email').value = ""; }
    }
    function removeMod(key) { db.ref('mods').child(key).remove(); }

    function pushTarget() {
        const u = document.getElementById('target-input').value;
        if(u.includes('http')) {
            db.ref('targets').push({ url: u, time: Date.now() });
            document.getElementById('target-input').value = "";
            alert("تم إرسال الإحداثيات للجيش!");
        }
    }

    // جلب الأهداف
    function loadTargets() {
        db.ref('targets').limitToLast(10).on('value', s => {
            const list = document.getElementById('targets-list');
            list.innerHTML = "";
            s.forEach(t => {
                const card = document.createElement('div');
                card.className = 'target-card';
                card.innerHTML = `<div style="color:var(--cyber-green); margin-bottom:5px;">● هدف نشط الآن</div>
                                 <div style="font-size:12px; color:#888; overflow:hidden; text-overflow:ellipsis;">${t.val().url}</div>
                                 <button class="btn-ui btn-danger" style="margin-top:15px; padding:10px; width:auto; min-width:150px;">بـدء الـهـجـوم</button>`;
                card.onclick = () => {
                    activeLink = t.val().url;
                    document.getElementById('strike-ui').classList.add('active');
                };
                list.prepend(card);
            });
        });
    }

    // وظائف الهجوم
    function launchTikTok() {
        const deepLink = activeLink.replace("https://www.tiktok.com/", "snssdk1128://");
        window.location.href = deepLink;
        setTimeout(() => { window.location.href = activeLink; }, 1200);
    }

    function launchGmail() {
        const emails = "feedback@tiktok.com,legal@tiktok.com,reports@tiktok.com";
        const engMsg = `URGENT REPORT\nTarget: ${activeLink}\nReason: Violating community standards and safety protocols. Requesting immediate review and suspension.\nID: DZ-STRIKE-2026`;
        
        navigator.clipboard.writeText(engMsg).then(() => {
            alert("تم نسخ نص البلاغ تلقائياً!");
            window.location.href = `mailto:${emails}?subject=Urgent Violation Report&body=${encodeURIComponent(engMsg)}`;
        });
    }

    function closeStrike() { document.getElementById('strike-ui').classList.remove('active'); }
</script>

</body>
</html>
